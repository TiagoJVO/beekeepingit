# Dart/Flutter tasks — discover every package (pubspec.yaml) and run the tool inside each.
# Flutter packages (detected by grepping pubspec.yaml for `sdk: flutter`) need the
# Flutter-specific runner throughout, not just for `test`/`build`: `dart pub get` can't
# resolve `sdk: flutter` dependencies (flutter_test, flutter_localizations) on a fresh
# checkout — "version solving failed ... Flutter users should use `flutter pub` instead of
# `dart pub`" — and plain `dart test` can't load `dart:ui`. `dart format` is fine either way
# (pure syntax formatting, no dependency resolution).
version: "3"

silent: true

vars:
  # Named FIND_DART_PKGS (not FIND_PKGS) — Task merges `vars:` from included
  # taskfiles into one global namespace, so a name shared with another
  # included taskfile (e.g. web.yml) silently clobbers it. go.yml's FIND_MODS
  # already follows this per-language-unique naming; web.yml now does too.
  FIND_DART_PKGS: >-
    find . -type f -name pubspec.yaml
    -not -path '*/.dart_tool/*'
    -not -path '*/.git/*'
    -not -path '*/.claude/worktrees/*'

tasks:
  lint:
    desc: "Analyze Dart/Flutter packages (flutter analyze / dart analyze) + verify formatting"
    cmds:
      # format-check runs first: unlike analyze, it needs no pub get and isn't
      # skipped for deployable components (see format-check below), so it's the
      # only repo-wide `task ci` step that actually checks client/'s formatting
      # today — build-publish.yml's per-component job runs analyze/test for
      # client but never a format check.
      - task: format-check
      # Skip deployable components (a dir with a Dockerfile, e.g. client/): they
      # are analyzed/tested per-component in build-publish.yml, not repo-wide in
      # `task ci` (#23) — mirrors go.yml.
      - |
        set -e
        pkgs=$({{.FIND_DART_PKGS}} | while read -r p; do d=$(dirname "$p"); [ -f "$d/Dockerfile" ] || echo "$p"; done)
        if [ -z "$pkgs" ]; then echo "› [dart] no non-component pubspec.yaml — skipping"; exit 0; fi
        for p in $pkgs; do
          d=$(dirname "$p")
          echo "› [dart] analyze $d"
          if grep -q 'sdk: *flutter' "$p"; then
            (cd "$d" && flutter pub get && flutter analyze)
          else
            (cd "$d" && dart pub get && dart analyze)
          fi
        done

  format-check:
    desc: "Verify Dart packages are dart-format-clean"
    cmds:
      # No Dockerfile filter (unlike lint/test): dart format needs no dependency
      # resolution, so it's cheap enough to cover every package including
      # deployable components — mirrors format's scope, not lint's.
      - |
        set -e
        pkgs=$({{.FIND_DART_PKGS}})
        if [ -z "$pkgs" ]; then echo "› [dart] no pubspec.yaml yet — skipping"; exit 0; fi
        for p in $pkgs; do
          d=$(dirname "$p")
          echo "› [dart] format-check $d"
          (cd "$d" && dart format --output=none --set-exit-if-changed .)
        done

  format:
    desc: "Format Dart packages (dart format)"
    cmds:
      - |
        set -e
        pkgs=$({{.FIND_DART_PKGS}})
        if [ -z "$pkgs" ]; then echo "› [dart] no pubspec.yaml yet — skipping"; exit 0; fi
        for p in $pkgs; do d=$(dirname "$p"); echo "› [dart] format $d"; (cd "$d" && dart format .); done

  test:
    desc: "Test Dart/Flutter packages (flutter test / dart test)"
    cmds:
      # Skip deployable components (tested per-component in build-publish.yml).
      - |
        set -e
        pkgs=$({{.FIND_DART_PKGS}} | while read -r p; do d=$(dirname "$p"); [ -f "$d/Dockerfile" ] || echo "$p"; done)
        if [ -z "$pkgs" ]; then echo "› [dart] no non-component pubspec.yaml — skipping"; exit 0; fi
        for p in $pkgs; do
          d=$(dirname "$p")
          echo "› [dart] test $d"
          if grep -q 'sdk: *flutter' "$p"; then (cd "$d" && flutter test); else (cd "$d" && dart test); fi
        done

  l10n-check:
    desc: >-
      Regenerate Flutter l10n (flutter gen-l10n) and fail on malformed ARB,
      keys missing in either language, or stale committed gen/ output (#78 AC:
      "extraction/build step wired into CI so missing or malformed translation
      resources fail the build"). Scoped to client/ specifically (rather than
      every FIND_DART_PKGS package) since l10n.yaml/lib/l10n/ is a client-only
      convention today.
    cmds:
      - |
        set -e
        d=client
        if [ ! -f "$d/l10n.yaml" ]; then echo "› [dart] no client/l10n.yaml — skipping l10n-check"; exit 0; fi
        echo "› [dart] l10n-check $d"
        (cd "$d" && flutter pub get)

        # ARB key-parity check: every message key in the template (app_en.arb)
        # must also exist in every other ARB file, and vice versa — `flutter
        # gen-l10n` silently accepts an ARB with extra keys (they're just
        # unused) and, depending on version/flags, may only warn rather than
        # fail on a key missing from a translation, so this catches that
        # explicitly. A "message key" is a top-level JSON key that isn't a
        # `@`-prefixed ICU/metadata entry or `@@locale`; ARB is JSON, so a
        # depth-1 quoted key always starts at 2-space indent right after the
        # opening `{`.
        # Uses plain temp files rather than `<(...)` process substitution —
        # go-task runs `sh`, not bash, and dash doesn't support it.
        arb_keys() {
          grep -oE '^  "[^"]+":' "$1" | sed -E 's/^  "([^"]+)":$/\1/' | grep -vE '^@' | sort -u
        }
        template="$d/lib/l10n/arb/app_en.arb"
        if [ ! -f "$template" ]; then
          echo "› [dart] template ARB $template not found." >&2
          exit 1
        fi
        template_keys_file="$(mktemp)"
        arb_keys "$template" > "$template_keys_file"
        arb_ok=0
        for f in "$d"/lib/l10n/arb/*.arb; do
          [ "$f" = "$template" ] && continue
          keys_file="$(mktemp)"
          arb_keys "$f" > "$keys_file"
          missing="$(comm -23 "$template_keys_file" "$keys_file")"
          extra="$(comm -13 "$template_keys_file" "$keys_file")"
          rm -f "$keys_file"
          if [ -n "$missing" ]; then
            echo "› [dart] $f is missing keys present in app_en.arb:" >&2
            echo "$missing" | sed 's/^/    /' >&2
            arb_ok=1
          fi
          if [ -n "$extra" ]; then
            echo "› [dart] $f has extra keys not present in app_en.arb:" >&2
            echo "$extra" | sed 's/^/    /' >&2
            arb_ok=1
          fi
        done
        rm -f "$template_keys_file"
        if [ "$arb_ok" -ne 0 ]; then
          echo "› [dart] ARB key parity check failed." >&2
          exit 1
        fi
        echo "› [dart] ARB key parity OK."

        # Malformed-ARB / untranslated-message check: gen-l10n itself fails
        # the build on invalid JSON or a message missing from a non-template
        # ARB (it errors rather than silently falling back at codegen time).
        (cd "$d" && flutter gen-l10n)

        # Stale-committed-output check: the regenerated lib/l10n/gen/ must be
        # byte-identical to what's committed (matches services/shared's
        # committed sqlc convention — no codegen step needed to build/test,
        # but that means CI must catch a source ARB edit that wasn't followed
        # by a regeneration).
        git diff --exit-code -- "$d/lib/l10n/gen" || {
          echo "› [dart] lib/l10n/gen is stale — run 'flutter gen-l10n' in client/ and commit the result." >&2
          exit 1
        }

  build:
    desc: "Build Dart/Flutter packages (flutter build web for Flutter apps)"
    cmds:
      - |
        set -e
        pkgs=$({{.FIND_DART_PKGS}})
        if [ -z "$pkgs" ]; then echo "› [dart] no pubspec.yaml yet — skipping"; exit 0; fi
        for p in $pkgs; do
          d=$(dirname "$p")
          if grep -q 'sdk: *flutter' "$p"; then
            echo "› [dart] build $d (flutter build web)"
            # --no-web-resources-cdn: bundle CanvasKit/fonts locally instead of fetching
            # from Google's CDN at runtime — required for an offline-first PWA (the app
            # must not depend on external network reachability just to paint its first
            # frame), and avoids a blank page wherever that CDN is unreachable/blocked.
            (cd "$d" && flutter build web --no-web-resources-cdn)
          else
            echo "› [dart] $d is a pure-Dart package — nothing to build, skipping"
          fi
        done
