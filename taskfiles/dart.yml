# Dart/Flutter tasks — discover every package (pubspec.yaml) and run the tool inside each.
# No-ops until the Flutter client is scaffolded (e.g. clients/app/pubspec.yaml). When it
# lands, add `flutter`/`dart` to mise.toml and the client's analysis_options.yaml includes
# the shared baseline at repo root.
version: "3"

silent: true

vars:
  FIND_PKGS: >-
    find . -type f -name pubspec.yaml
    -not -path '*/.dart_tool/*'
    -not -path '*/.git/*'
    -not -path '*/.claude/worktrees/*'

tasks:
  lint:
    desc: "Analyze Dart packages (dart analyze)"
    cmds:
      - |
        set -e
        pkgs=$({{.FIND_PKGS}})
        if [ -z "$pkgs" ]; then echo "› [dart] no pubspec.yaml yet — skipping"; exit 0; fi
        for p in $pkgs; do d=$(dirname "$p"); echo "› [dart] analyze $d"; (cd "$d" && dart pub get && dart analyze); done

  format:
    desc: "Format Dart packages (dart format)"
    cmds:
      - |
        set -e
        pkgs=$({{.FIND_PKGS}})
        if [ -z "$pkgs" ]; then echo "› [dart] no pubspec.yaml yet — skipping"; exit 0; fi
        for p in $pkgs; do d=$(dirname "$p"); echo "› [dart] format $d"; (cd "$d" && dart format .); done

  test:
    desc: "Test Dart packages (dart test)"
    cmds:
      - |
        set -e
        pkgs=$({{.FIND_PKGS}})
        if [ -z "$pkgs" ]; then echo "› [dart] no pubspec.yaml yet — skipping"; exit 0; fi
        for p in $pkgs; do d=$(dirname "$p"); echo "› [dart] test $d"; (cd "$d" && dart test); done

  build:
    desc: "Build placeholder — platform-specific build wiring lands with the client"
    cmds:
      - echo "› [dart] build is wired per-package when the Flutter client lands — skipping"
