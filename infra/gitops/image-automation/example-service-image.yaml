# EXAMPLE per-service image tracking (copy + rename per service when it ships a Dockerfile and
# publishes to ghcr.io via .github/workflows/build-publish.yml). Uses the `gateway` service as a
# worked example. Together the two objects below tell Flux which published tag is "newest".
#
# This is a TEMPLATE (not reconciled) until moved/activated — see README.md ("Activation").
#
# ImageRepository — poll the registry for available tags of this service's image.
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: gateway
  namespace: flux-system
spec:
  image: ghcr.io/tiagojvo/beekeepingit/services-gateway
  interval: 5m
  # Once images are private, add a pull secret:
  # secretRef:
  #   name: ghcr-pull   # docker-registry secret in flux-system (see README "Activation")
---
# ImagePolicy — pick the newest build. build-publish.yml tags main images
# `<YYYYMMDDHHMMSS>-<sha>`; we extract the timestamp and order numerically so the most
# recently built image wins (commit SHAs alone are NOT chronologically sortable).
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: gateway
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: gateway
  filterTags:
    pattern: "^(?P<ts>[0-9]{14})-[0-9a-f]+$"
    extract: "$ts"
  policy:
    numerical:
      order: asc
# Then, in the deploy manifest under apps/dev/, annotate the image tag with the setter marker so
# ImageUpdateAutomation rewrites it on each new build, e.g. in the gateway HelmRelease values:
#
#   gateway:
#     image:
#       repository: ghcr.io/tiagojvo/beekeepingit/services-gateway
#       tag: 20260705120000-abc1234  # {"$imagepolicy": "flux-system:gateway:tag"}
