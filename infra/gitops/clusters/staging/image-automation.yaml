# Flux image-automation ENGINE for `staging` — activates
# infra/gitops/image-automation/README.md's dormant mechanism for this
# cluster specifically, by living directly under clusters/staging/ (a
# reconciled Kustomization path) rather than the shared, deliberately
# unreconciled infra/gitops/image-automation/ directory dev's dormant copy
# sits in. Different clusters need their own copy of this engine regardless
# (Flux resources are cluster-scoped) — see service-images.yaml for the
# per-image ImageRepository + ImagePolicy that decide WHICH tag to set.
#
# Needs the `beekeepingit` GitRepository (flux-system.yaml) to carry PUSH
# (write) credentials, not just the read-only anonymous HTTPS clone it uses
# today — tracked in FOLLOWUPS.md (D-26/ADR-0017 follow-up); this object is
# harmless to have applied before that lands, it'll just fail to push until
# the credential exists.
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageUpdateAutomation
metadata:
  name: beekeepingit-staging
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: beekeepingit
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        email: 41898282+github-actions[bot]@users.noreply.github.com
        name: flux-image-automation
      messageTemplate: |
        chore(deploy): update staging image tags

        Automated by Flux image-automation.
        {{ range $image, $_ := .Updated.Images -}}
        - {{ $image }}
        {{ end -}}
    push:
      branch: main
  update:
    path: ./infra/gitops/apps/staging
    strategy: Setters
