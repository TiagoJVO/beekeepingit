# Points Flux at the app-level manifests for the `staging` cluster (kept
# separate from the bootstrap wiring in flux-system.yaml, mirroring
# clusters/dev/apps.yaml).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: beekeepingit-staging
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: beekeepingit
  path: ./infra/gitops/apps/staging
  prune: true
  dependsOn:
    - name: flux-system
