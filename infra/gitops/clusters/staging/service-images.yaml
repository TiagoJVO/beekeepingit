# Per-service image tracking for `staging` — lives directly under
# clusters/staging/ (a reconciled path) to activate, see
# image-automation.yaml's header comment for why. Corrects an assumption in
# dev's dormant infra/gitops/image-automation/slice-service-images.yaml: the
# real service list is 7 (charts/services/values.yaml: identity/
# organizations/apiaries/activities/journeys/todos/sync), not 4 — see
# D-26/ADR-0017.
#
# client is the one exception to the plain `<ts>-<sha>` pattern every other
# image uses: build-publish.yml's per-environment matrix tags the PWA's
# staging variant `staging-<ts>-<sha>` (one shared image repo across
# environments, env-prefixed tags — see that workflow's comment), so its
# ImagePolicy below must filter on that prefix specifically, or it could
# pick up a dev-tagged build instead.
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: services-identity
  namespace: flux-system
spec:
  image: ghcr.io/tiagojvo/beekeepingit/services-identity
  interval: 5m
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: services-identity
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: services-identity
  filterTags:
    pattern: "^(?P<ts>[0-9]{14})-[0-9a-f]+$"
    extract: "$ts"
  policy:
    numerical:
      order: asc
---
