# Bootstrap objects for the `staging` cluster (Scaleway Kapsule, D-26): where
# Flux pulls from, and the self-referential Kustomization that keeps
# everything under infra/gitops/clusters/staging/ (including this file)
# reconciled from Git. See infra/gitops/README.md for the one-time
# `kubectl apply` bootstrap step and clusters/dev/flux-system.yaml for the
# pattern this mirrors.
#
# Tracks `main`, same as dev, for now — there is no release-branch/tag
# convention yet to decouple staging's deploy cadence from dev's. Revisit
# `spec.ref` here if that's ever wanted.
#
# TEMPORARY: pinned to the cloud-provider-selection-69de9f feature branch
# instead of `main` so this first stand-up can be verified end-to-end before
# merge (nothing under infra/gitops/{apps,clusters}/staging/ exists on `main`
# yet). Revert to `branch: main` before this branch merges — see
# FOLLOWUPS.md.
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: beekeepingit
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/TiagoJVO/beekeepingit
  ref:
    branch: claude/cloud-provider-selection-69de9f
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: beekeepingit
  path: ./infra/gitops/clusters/staging
  prune: true
