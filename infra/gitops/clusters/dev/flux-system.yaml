# Bootstrap objects for the `dev` cluster: where Flux pulls from, and the
# self-referential Kustomization that keeps everything under
# infra/gitops/clusters/dev/ (including this file) reconciled from Git.
# See infra/gitops/README.md for the one-time `kubectl apply` bootstrap step.
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: beekeepingit
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/TiagoJVO/beekeepingit
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: beekeepingit
  path: ./infra/gitops/clusters/dev
  prune: true
