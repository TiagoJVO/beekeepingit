# Bootstrap objects for a future `prod` cluster — NOT deployed anywhere yet
# (D-26: prod is deliberately deferred until Q-DR and #90 land at M6, see
# environments/prod.yaml's header). Prepared now, mirroring
# clusters/staging/flux-system.yaml exactly, so prod's eventual bring-up
# starts from the already-fixed pattern instead of rediscovering staging's
# bugs (schema-grants install deadlock, the gateway NetworkPolicy namespace
# mismatch, ...) from scratch. Existing here as inert Git state does nothing
# until someone actually runs the one-time `kubectl apply -f
# infra/gitops/clusters/prod/` bootstrap against a real prod cluster (see
# infra/gitops/README.md) — same as clusters/staging/ did before D-26.
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: beekeepingit
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/TiagoJVO/beekeepingit
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: beekeepingit
  path: ./infra/gitops/clusters/prod
  prune: true
