# Per-service image tracking for a future `prod` cluster — see
# image-automation.yaml's header (not deployed yet, prepared per D-26).
#
# Deliberately DIFFERENT selection policy from clusters/staging/service-images.yaml:
# staging's ImagePolicy picks the numerically-newest `<ts>-<sha>` tag
# (tracks every main-branch build automatically); this one uses Flux's
# `policy.semver` instead, which only ever considers tags that parse as
# valid semver (anything else — sha-/timestamp-tagged staging builds
# sharing the SAME image repos — is silently ignored, no separate
# filterTags regex needed) and picks the highest version. Release tags
# (.github/workflows/release-deploy.yml, e.g. v1.2.3) are the only thing
# that ever produces a matching tag, and that workflow's push step is
# gated behind manual approval — so this only ever advances on an
# explicitly released, approved version, never "whatever's newest".
#
# No client entry: the PWA isn't built for a release yet (no real prod
# domain to bake into its compile-time config, D-26/release-deploy.yml's
# own comment) — add one here once that exists, mirroring
# clusters/staging/service-images.yaml's client entry but with a
# semver-filtered policy instead of the staging-<ts>-<sha> pattern.
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: services-identity
  namespace: flux-system
spec:
  image: ghcr.io/tiagojvo/beekeepingit/services-identity
  interval: 5m
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: services-identity
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: services-identity
  policy:
    semver:
      range: ">=0.0.0"
---
