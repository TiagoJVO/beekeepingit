# Dev-only OIDC issuer alignment for the walking skeleton (#23).
#
# In the k3d dev cluster the browser reaches the gateway on host port :8080
# (mapped to Traefik), so the token issuer is `http://keycloak.beekeepingit.local:8080`
# (pinned via Keycloak's KC_HOSTNAME, see keycloak-helmrelease.yaml). For a
# service's `go-oidc` discovery to match that exact URL in-cluster:
#   1. `keycloak-oidc` exposes Keycloak's container http port on :8080 (the
#      Keycloak Service itself only has :80), so the host:port resolves the same
#      way inside the cluster as outside.
#   2. the CoreDNS rewrite makes `keycloak.beekeepingit.local` resolve to that
#      Service in-cluster.
# Production serves Keycloak over HTTPS on a real hostname, where none of this
# is needed. Applied by infra/cluster/dev-up.sh (not GitOps-synced).
apiVersion: v1
kind: Service
metadata:
  name: keycloak-oidc
  namespace: beekeepingit-dev
  labels:
    app.kubernetes.io/part-of: beekeepingit
    app.kubernetes.io/name: keycloak
spec:
  selector:
    app.kubernetes.io/instance: keycloak
    app.kubernetes.io/name: keycloakx
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-custom
  namespace: kube-system
data:
  keycloak.override: |
    rewrite name keycloak.beekeepingit.local keycloak-oidc.beekeepingit-dev.svc.cluster.local
