# Deploys the umbrella chart onto a future `prod` cluster — NOT deployed
# anywhere yet (D-26: prod is deliberately deferred until Q-DR and #90 land
# at M6, see environments/prod.yaml's header). Mirrors
# apps/staging/beekeepingit-helmrelease.yaml exactly, including every fix
# that first staging bring-up found, so prod doesn't rediscover them from
# scratch — see that file's own comments for the full rationale behind each
# one. Values below mirror environments/prod.yaml; every host-shaped value
# is a clearly-marked placeholder (no prod cluster/IP/domain exists yet).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: beekeepingit
  namespace: flux-system
spec:
  interval: 5m
  targetNamespace: beekeepingit-prod
  releaseName: beekeepingit
  install:
    createNamespace: true
    # See apps/staging/beekeepingit-helmrelease.yaml's matching comment: a
    # from-scratch install deadlocks without this — the schema-grants
    # post-install hook every DB-backed service/PowerSync depends on only
    # runs after Helm's wait-for-ready succeeds, but those Deployments can't
    # pass that wait without the hook.
    disableWait: true
    timeout: 10m
    remediation:
      retries: 3
  upgrade:
    disableWait: true
    timeout: 10m
  chart:
    spec:
      chart: ./infra/helm/beekeepingit
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: beekeepingit
        namespace: flux-system
  values:
    global:
      environment: prod
      namespace: beekeepingit-prod
      appOrigin: https://app.beekeepingit.example # TODO: real domain
    gateway:
      appHost: app.beekeepingit.example # TODO: real domain
      authHost: auth.beekeepingit.example # TODO: real domain
      certManager:
        enabled: true
        clusterIssuer: letsencrypt-prod
    services:
      oidc:
        issuerUrl: https://auth.beekeepingit.example/application/o/beekeepingit/ # TODO: real domain
        discoveryUrl: http://authentik-server/application/o/beekeepingit/
        audience: beekeepingit-pwa
      # Same 7 services as apps/staging/ — see that file's comment.
      # Image-automation is wired (clusters/prod/{image-automation,
      # service-images}.yaml) — semver-filtered, only ever advances on an
      # approved .github/workflows/release-deploy.yml release, never
      # "whatever's newest" the way staging's does. v0.0.0 below is a inert
      # placeholder (no release has ever been cut) — live only once the
      # Flux Git-write credential exists (FOLLOWUPS.md) AND a real prod
      # cluster exists to apply any of this to.
      services:
        identity:
          tag: v0.0.0 # {"$imagepolicy": "flux-system:services-identity:tag"}
        organizations:
          tag: v0.0.0 # {"$imagepolicy": "flux-system:services-organizations:tag"}
        apiaries:
          tag: v0.0.0 # {"$imagepolicy": "flux-system:services-apiaries:tag"}
        activities:
          tag: v0.0.0 # {"$imagepolicy": "flux-system:services-activities:tag"}
        journeys:
          tag: v0.0.0 # {"$imagepolicy": "flux-system:services-journeys:tag"}
        todos:
          tag: v0.0.0 # {"$imagepolicy": "flux-system:services-todos:tag"}
        sync:
          tag: v0.0.0 # {"$imagepolicy": "flux-system:services-sync:tag"}
    pwa:
      image:
        tag: latest # TODO: no client-prod build exists yet — see release-deploy.yml's own comment and FOLLOWUPS.md
    # networkpolicy.gatewayNamespace intentionally NOT overridden (defaults
    # to kube-system, charts/networkpolicy/values.yaml) — prod's own cluster
    # bring-up hasn't been designed yet, so which namespace its ingress
    # controller will live in isn't known. Revisit alongside a prod
    # equivalent of infra/cluster/scaleway-up.sh once that exists — see that
    # script's own gatewayNamespace: traefik override for the pattern this
    # will likely need too.
