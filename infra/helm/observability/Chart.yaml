apiVersion: v2
name: observability
description: >-
  Observability stack for the BeekeepingIT platform (#87, NFR-OBS-1/NFR-PER-1) —
  OTel Collector + kube-prometheus-stack + Loki + Tempo + a local/dev alert sink.
  Deployed as its OWN Flux HelmRelease (infra/gitops/apps/dev/), separate from the
  beekeepingit umbrella chart, so its Loki/Tempo can depend on MinIO (dependsOn:
  [minio]) without creating a dependency cycle — MinIO's own HelmRelease dependsOn
  the umbrella (for the root-credentials Secret), so anything needing MinIO can't
  live inside that umbrella. See ADR-0013.
type: application
version: 0.1.0
appVersion: "0.1.0"
# The four vendored charts are direct remote dependencies (`helm dependency build`
# fetches them; Flux's source-controller resolves a GitRepository-sourced chart's
# own top-level remote dependencies the same way — verified live, unlike the
# *nested* subchart-of-a-subchart case that broke keycloak/minio, ADR-0012).
# alert-webhook-sink is our own local chart. Each dependency's values live under
# a top-level key matching its `name` (see values.yaml).
dependencies:
  - name: kube-prometheus-stack
    version: "87.10.0"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: kube-prometheus-stack.enabled
  - name: loki
    version: "7.0.0"
    repository: "https://grafana.github.io/helm-charts"
    condition: loki.enabled
  - name: tempo
    version: "1.24.4"
    repository: "https://grafana.github.io/helm-charts"
    condition: tempo.enabled
  - name: opentelemetry-collector
    version: "0.162.0"
    repository: "https://open-telemetry.github.io/opentelemetry-helm-charts"
    condition: opentelemetry-collector.enabled
  - name: alert-webhook-sink
    version: "0.1.0"
    repository: "file://charts/alert-webhook-sink"
    condition: alert-webhook-sink.enabled
