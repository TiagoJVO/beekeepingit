{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "alert-webhook-sink.fullname" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "beekeepingit.labels" . | nindent 4 }}
    app.kubernetes.io/name: alert-webhook-sink
spec:
  selector:
    app.kubernetes.io/name: alert-webhook-sink
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: 8080
      targetPort: 8080
{{- end }}
