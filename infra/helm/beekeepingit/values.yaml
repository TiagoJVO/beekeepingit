# Base/default values for the beekeepingit umbrella chart. Environment overlays in
# environments/*.yaml override the fields that differ per environment (namespace,
# resource tiers) — see infra/helm/beekeepingit/README.md.

global:
  # dev | staging | prod — validated by values.schema.json.
  environment: dev
  # Target namespace for this release. Create it with
  # `helm install ... --namespace <ns> --create-namespace`.
  namespace: beekeepingit

  # Resource-request/limit presets every subchart should reference via
  # `.Values.global.resources.<tier>` instead of hardcoding numbers, so sizing is
  # tuned in one place per environment.
  resources:
    small:
      requests: { cpu: 25m, memory: 32Mi }
      limits: { cpu: 100m, memory: 64Mi }
    medium:
      requests: { cpu: 100m, memory: 128Mi }
      limits: { cpu: 250m, memory: 256Mi }
    large:
      requests: { cpu: 250m, memory: 256Mi }
      limits: { cpu: 500m, memory: 512Mi }

# Platform backing services (#84) — see each subchart's own values.yaml for the
# full set of overridable fields; only the wiring-relevant ones are set here.
# The observability stack (#87) is NOT part of this umbrella — it's its own chart
# (infra/helm/observability) + Flux HelmRelease, deployed after MinIO (ADR-0013).

postgres:
  enabled: true
  image: ghcr.io/cloudnative-pg/postgis:18.4-3.6.4-system-trixie
  instances: 1
  storageSize: 1Gi
  resourceTier: medium
  # One schema (+ login role) per future domain service (data-model.md §4) — the
  # scaffold services will grow into as #23/EPIC-02+ land, not #84's concern to
  # populate with tables.
  schemas:
    - identity
    - organizations
    - apiaries
    - activities
    - journeys
    - todos
    - ai

authentik:
  enabled: true
  # No workload of its own (just the config/Postgres Secrets + blueprint ConfigMap)
  # — Authentik itself is a separate Flux HelmRelease, see ADR-0012/ADR-0016.

minio:
  enabled: true
  # No workload of its own (just the root-credentials Secret) — MinIO itself is
  # a separate Flux HelmRelease, see ADR-0012. Its buckets (loki/tempo, #87) are
  # configured on that standalone HelmRelease
  # (infra/gitops/apps/dev/minio-helmrelease.yaml), not here.

gateway:
  enabled: true
  # Two hosts now (ADR-0016, oidc-integration.md §2): the app origin (PWA + Go APIs
  # + PowerSync) and a dedicated auth origin for Authentik — a separate origin keeps
  # the app cross-origin-isolated (COOP/COEP → SharedArrayBuffer for PowerSync) and
  # avoids Authentik's broad root paths (/api, /static, /if, /-, ...) colliding with
  # the PWA `/` catch-all. The self-signed TLS Secret's SAN covers both.
  appHost: app.beekeepingit.local
  authHost: auth.beekeepingit.local
  # No workload of its own (just Ingress + a self-signed TLS Secret) — reuses
  # k3d's already-running Traefik, so there's no resourceTier to size here.

powersync:
  enabled: true
  image:
    repository: journeyapps/powersync-service
    tag: "1.23.2"
  resourceTier: medium
  # Real org-scoped Sync Rules + the `sync` service's JWKS connector now wired
  # in the subchart's own values.yaml (#23/#106) — the #22 stopgaps (the OIDC
  # realm JWKS, pg_tables placeholder) are gone.

# The Go services (#23) — identity/organizations/apiaries/sync. Image tag +
# per-service wiring live in the subchart's own values.yaml; overlays/CI bump
# the tag. On merge, Flux image-automation reconciles the published tag.
services:
  enabled: true

# The Flutter Web PWA static bundle (#21/#23), served behind the gateway's `/`.
pwa:
  enabled: true
