apiVersion: v2
name: beekeepingit
description: >-
  Umbrella chart for the BeekeepingIT platform (NFR-ARC-1/NFR-ARC-3, D-1) — composes
  per-service subcharts into one release on a single k8s cluster.
type: application
version: 0.1.0
appVersion: "0.1.0"
# Subcharts plug in three ways (see README.md):
#  - a plain Helm chart dropped under charts/<service>/, declared here via
#    `repository: "file://charts/<service>"` (our own services — postgres/gateway
#    are entirely hand-rolled; alert-webhook-sink too);
#  - a local chart holding only supplementary templates for something deployed
#    separately: `keycloak`/`minio` generate credentials/realm-import here, but
#    the actual vendored charts (codecentric/keycloakx, charts.min.io) run as
#    their own Flux `HelmRelease`s (`infra/gitops/apps/dev/`), not nested —
#    Flux's GitRepository-sourced charts don't recursively resolve a subchart's
#    own vendored dependency, so nesting them (the original ADR-0010 approach)
#    silently produced zero workload; see ADR-0012;
#  - a third-party chart vendored straight from its upstream repo (observability
#    stack below, #87) — no local charts/<name>/ wrapper needed, `helm dependency
#    build` fetches it directly (this one has no supplementary templates to add,
#    unlike keycloak/minio above, so it needs no local chart at all).
# Each subchart's values live under a top-level key matching its `name` (see
# values.yaml/README.md), and it reads shared config via `.Values.global`.
dependencies:
  - name: postgres
    version: "0.1.0"
    repository: "file://charts/postgres"
    condition: postgres.enabled
  - name: keycloak
    version: "0.1.0"
    repository: "file://charts/keycloak"
    condition: keycloak.enabled
  - name: minio
    version: "0.1.0"
    repository: "file://charts/minio"
    condition: minio.enabled
  - name: gateway
    version: "0.1.0"
    repository: "file://charts/gateway"
    condition: gateway.enabled
  - name: kube-prometheus-stack
    version: "87.10.0"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: kube-prometheus-stack.enabled
  - name: loki
    version: "7.0.0"
    repository: "https://grafana.github.io/helm-charts"
    condition: loki.enabled
  - name: tempo
    version: "1.24.4"
    repository: "https://grafana.github.io/helm-charts"
    condition: tempo.enabled
  - name: opentelemetry-collector
    version: "0.162.0"
    repository: "https://open-telemetry.github.io/opentelemetry-helm-charts"
    condition: opentelemetry-collector.enabled
  - name: alert-webhook-sink
    version: "0.1.0"
    repository: "file://charts/alert-webhook-sink"
    condition: alert-webhook-sink.enabled
