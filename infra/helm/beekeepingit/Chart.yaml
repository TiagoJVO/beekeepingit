apiVersion: v2
name: beekeepingit
description: >-
  Umbrella chart for the BeekeepingIT platform (NFR-ARC-1/NFR-ARC-3, D-1) — composes
  per-service subcharts into one release on a single k8s cluster.
type: application
version: 0.1.0
appVersion: "0.1.0"
# Every subchart is declared here so `helm dependency build`/`helm lint` can see
# it, all as local file:// deps — none of them have their own nested
# dependencies, so this always resolves purely from what's checked into Git,
# no network fetch. `postgres`/`gateway` are entirely hand-rolled.
# `authentik`/`minio` only hold our own supplementary templates (generated
# credentials, the Authentik blueprint) — the actual vendored charts
# (authentik/authentik, charts.min.io) are deployed separately as their own Flux
# `HelmRelease`s (the beekeepingit-gitops repo's `apps/dev/`), not nested here, since Flux's
# GitRepository-sourced charts don't recursively resolve a subchart's own vendored
# dependency — see ADR-0012 (supersedes the ADR-0010 wrapper-chart approach for
# these two) and ADR-0016 (the Keycloak→Authentik swap).
# The observability stack (#87) is its own chart entirely
# (infra/helm/observability, own Flux HelmRelease) — its Loki/Tempo depend on
# MinIO, so it can't live in this umbrella without a dependency cycle (ADR-0013).
# Each subchart's values live under a top-level key matching its name, and it
# reads shared config via `.Values.global` (see values.yaml, README.md).
# `powersync` (#22, D-6/ADR-0005) is hand-rolled too — PowerSync ships as a
# bare Docker image, not a Helm chart of its own.
dependencies:
  - name: postgres
    version: "0.1.0"
    repository: "file://charts/postgres"
    condition: postgres.enabled
  - name: authentik
    version: "0.1.0"
    repository: "file://charts/authentik"
    condition: authentik.enabled
  - name: minio
    version: "0.1.0"
    repository: "file://charts/minio"
    condition: minio.enabled
  - name: gateway
    version: "0.1.0"
    repository: "file://charts/gateway"
    condition: gateway.enabled
  # Dev/CI SMTP sink for Authentik's outbound email (#361, ADR-0019) — hand-rolled
  # (mailpit ships as a bare Docker image, like powersync). Disabled in prod.
  - name: mailpit
    version: "0.1.0"
    repository: "file://charts/mailpit"
    condition: mailpit.enabled
  - name: powersync
    version: "0.1.0"
    repository: "file://charts/powersync"
    condition: powersync.enabled
  # The Go domain/platform services (#23) — one values-driven subchart renders
  # identity/organizations/apiaries/sync (each a Deployment + Service).
  - name: services
    version: "0.1.0"
    repository: "file://charts/services"
    condition: services.enabled
  # The Flutter Web PWA static bundle (#21/#23).
  - name: pwa
    version: "0.1.0"
    repository: "file://charts/pwa"
    condition: pwa.enabled
  # Default-deny + explicit-allow NetworkPolicies for the whole namespace
  # (EPIC-14 #89, NFR-SEC-1) — applies namespace-wide, so it also covers pods
  # owned by the standalone authentik/minio Flux HelmReleases (ADR-0012),
  # not just this umbrella's own subcharts.
  - name: networkpolicy
    version: "0.1.0"
    repository: "file://charts/networkpolicy"
    condition: networkpolicy.enabled
