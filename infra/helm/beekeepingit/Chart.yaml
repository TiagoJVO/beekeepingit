apiVersion: v2
name: beekeepingit
description: >-
  Umbrella chart for the BeekeepingIT platform (NFR-ARC-1/NFR-ARC-3, D-1) — composes
  per-service subcharts into one release on a single k8s cluster.
type: application
version: 0.1.0
appVersion: "0.1.0"
# Every subchart is declared here so `helm dependency build`/`helm lint` can see
# it, all as local file:// deps. `postgres`/`gateway` are entirely hand-rolled.
# `keycloak`/`minio` are thin *wrapper* charts: each has its own nested
# dependency on a real vendored upstream chart (codecentric/keycloakx,
# charts.min.io) plus our own supplementary templates (generated credentials,
# realm import) that a vendored chart can't own itself — see ADR-0009 and each
# wrapper's own Chart.yaml. Each subchart's values live under a top-level key
# matching its name, and it reads shared config via `.Values.global` (see
# values.yaml, README.md).
dependencies:
  - name: postgres
    version: "0.1.0"
    repository: "file://charts/postgres"
    condition: postgres.enabled
  - name: keycloak
    version: "0.1.0"
    repository: "file://charts/keycloak"
    condition: keycloak.enabled
  - name: minio
    version: "0.1.0"
    repository: "file://charts/minio"
    condition: minio.enabled
  - name: gateway
    version: "0.1.0"
    repository: "file://charts/gateway"
    condition: gateway.enabled
