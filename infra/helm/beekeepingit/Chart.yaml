apiVersion: v2
name: beekeepingit
description: >-
  Umbrella chart for the BeekeepingIT platform (NFR-ARC-1/NFR-ARC-3, D-1) â€” composes
  per-service subcharts into one release on a single k8s cluster.
type: application
version: 0.1.0
appVersion: "0.1.0"
# Every subchart is declared here so `helm dependency build`/`helm lint` can see
# it, all as local file:// deps â€” none of them have their own nested
# dependencies, so this always resolves purely from what's checked into Git,
# no network fetch. `postgres`/`gateway` are entirely hand-rolled.
# `authentik`/`minio` only hold our own supplementary templates (generated
# credentials, the Authentik blueprint) â€” the actual vendored charts
# (authentik/authentik, charts.min.io) are deployed separately as their own Flux
# `HelmRelease`s (`infra/gitops/apps/dev/`), not nested here, since Flux's
# GitRepository-sourced charts don't recursively resolve a subchart's own vendored
# dependency â€” see ADR-0012 (supersedes the ADR-0010 wrapper-chart approach for
# these two) and ADR-0016 (the Keycloakâ†’Authentik swap).
# The observability stack (#87) is its own chart entirely
# (infra/helm/observability, own Flux HelmRelease) â€” its Loki/Tempo depend on
# MinIO, so it can't live in this umbrella without a dependency cycle (ADR-0013).
# Each subchart's values live under a top-level key matching its name, and it
# reads shared config via `.Values.global` (see values.yaml, README.md).
# `powersync` (#22, D-6/ADR-0005) is hand-rolled too â€” PowerSync ships as a
# bare Docker image, not a Helm chart of its own.
dependencies:
  - name: postgres
    version: "0.1.0"
    repository: "file://charts/postgres"
    condition: postgres.enabled
  - name: authentik
    version: "0.1.0"
    repository: "file://charts/authentik"
    condition: authentik.enabled
  - name: minio
    version: "0.1.0"
    repository: "file://charts/minio"
    condition: minio.enabled
  - name: gateway
    version: "0.1.0"
    repository: "file://charts/gateway"
    condition: gateway.enabled
  - name: powersync
    version: "0.1.0"
    repository: "file://charts/powersync"
    condition: powersync.enabled
  # The Go domain/platform services (#23) â€” one values-driven subchart renders
  # identity/organizations/apiaries/sync (each a Deployment + Service).
  - name: services
    version: "0.1.0"
    repository: "file://charts/services"
    condition: services.enabled
  # The Flutter Web PWA static bundle (#21/#23).
  - name: pwa
    version: "0.1.0"
    repository: "file://charts/pwa"
    condition: pwa.enabled
