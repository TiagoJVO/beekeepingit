{{/*
Assumes the CloudNativePG operator is already installed on the cluster (a
cluster-scoped prerequisite provisioned by infra/cluster/up.sh, not this chart
— see ADR-0010). One instance (no HA yet — single small dev cluster, NFR-ARC-3).
*/}}
{{- if .Values.enabled }}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ include "postgres.fullname" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "beekeepingit.labels" . | nindent 4 }}
    app.kubernetes.io/name: postgres
spec:
  instances: {{ .Values.instances | default 1 }}
  imageName: {{ .Values.image }}
  storage:
    size: {{ .Values.storageSize }}
  resources:
    {{- index .Values.global.resources .Values.resourceTier | toYaml | nindent 4 }}
  postgresql:
    # Logical replication, required by the PowerSync sync engine (D-6, ADR-0005)
    # to stream the `powersync` publication (below) to its self-hosted service.
    parameters:
      wal_level: "logical"
      max_wal_senders: "10"
      max_replication_slots: "10"
  bootstrap:
    initdb:
      database: beekeepingit
      owner: beekeepingit
      # Runs once, as superuser, connected to the default `postgres` database,
      # *before* the `beekeepingit` application database above is even created
      # — the only bootstrap hook that can CREATE DATABASE. Used for PowerSync's
      # bucket-storage database (ADR-0005: "a SEPARATE database, so the
      # `powersync` publication below never captures it") — deliberately not a
      # schema in `beekeepingit` like the domain services below.
      postInitSQL:
        - CREATE DATABASE powersync_storage OWNER beekeepingit;
      # Runs once, as superuser, inside the `beekeepingit` application database
      # (postInitApplicationSQL — not postInitSQL/postInitTemplateSQL, which run
      # against `postgres`/`template1` instead), *before* spec.managed.roles
      # below is reconciled — so this can only create schemas (owned by the
      # `beekeepingit` app user, so it — not just a superuser — can later GRANT
      # on them), not GRANT to the per-service roles yet: they don't exist at
      # bootstrap time. See templates/schema-grants-job.yaml for the grants.
      postInitApplicationSQL:
        - CREATE EXTENSION IF NOT EXISTS postgis;
        {{- range .Values.schemas }}
        - CREATE SCHEMA IF NOT EXISTS {{ . }} AUTHORIZATION beekeepingit;
        {{- end }}
        # Scoped to the SYNCABLE schemas only — NOT `FOR ALL TABLES`
        # (walking-skeleton.md §5.3, sync.md §3.4): PowerSync's bucket-storage
        # DB must not become a shadow copy of non-synced data (identity, ai,
        # invitations, …). `FOR TABLES IN SCHEMA` (PG15+) is createable at
        # bootstrap because the schemas already exist (above) even though their
        # tables don't yet, and it auto-includes future additive tables in
        # those schemas — so a new syncable service only extends the
        # `syncedSchemas` list here, no post-migration ALTER PUBLICATION.
        - CREATE PUBLICATION powersync FOR TABLES IN SCHEMA {{ join ", " .Values.syncedSchemas }};
  managed:
    roles:
      {{- range .Values.schemas }}
      - name: {{ . }}_svc
        ensure: present
        login: true
        passwordSecret:
          name: {{ . }}-svc-credentials
      {{- end }}
      # `beekeepingit` already exists (created above by bootstrap.initdb.owner,
      # not by this managed.roles list) — CNPG reconciles managed.roles by
      # role NAME against actual Postgres state, not by "who created it", so
      # adding an already-existing role here is supported and simply extends
      # what's reconciled for it (confirmed: CNPG's own docs example lists
      # `app`, its default initdb-owner role name, in `status.managedRolesStatus.reconciled`
      # alongside user-defined managed roles — cloudnative-pg.io/documentation
      # /current/declarative_role_management).
      #
      # CAUTION verified against CNPG's own reconciler source
      # (internal/management/controller/roles/postgres.go's Update/
      # appendRoleOptions): every reconcile issues a FULL `ALTER ROLE
      # beekeepingit <every boolean attribute>`, so this entry must explicitly
      # restate every attribute beekeepingit actually needs — an omitted
      # boolean (e.g. `login`) is NOT "leave as-is", it reconciles to its
      # Postgres/Go zero-value (NOLOGIN), which would break every Job/service
      # using the `beekeepingit` credential. `login: true` below is therefore
      # required, not redundant. The one exception is the password: per
      # RoleConfiguration.PasswordSecret's doc ("if null, the password will be
      # ignored unless DisablePassword is set") and confirmed in
      # roles.go's DatabaseRoleFromConfiguration, omitting `passwordSecret`
      # (as below) safely leaves beekeepingit's existing password — the
      # `{{ include "postgres.fullname" . }}-app` Secret every Job/service
      # already authenticates with — untouched.
      #
      # #62 (history.md §7.1): beekeepingit needs to be able to `ALTER TABLE
      # ... OWNER TO beekeepingit` on each service's audit_log/
      # sync_conflict_log (audit-immutability-job.yaml) after that service's
      # own migration creates it (as `<schema>_svc`, making `<schema>_svc`
      # the owner). `ALTER TABLE ... OWNER TO X` requires the acting role to
      # be able to `SET ROLE X` — i.e. be a member of the NEW owner — so it's
      # beekeepingit that needs membership in `<schema>_svc` (this direction),
      # not the other way around. A manual `GRANT <schema>_svc TO
      # beekeepingit` run BY beekeepingit itself does NOT work (confirmed:
      # Postgres requires CREATEROLE + ADMIN OPTION on the target role to
      # grant its membership, which beekeepingit — a plain login role — has
      # neither of) — this must be reconciled by CNPG's own operator
      # connection instead, exactly like `powersync`'s inRoles below already
      # does for the identical reason ("neither the app owner nor a
      # non-superuser can GRANT on" a `*_svc`-owned object, per that role's
      # own comment). Plain membership (no adminOption/inherit override — see
      # RoleConfiguration's InRoles docs) is enough: verified empirically
      # that ALTER TABLE OWNER TO only needs INHERIT membership, not ADMIN
      # OPTION or an active SET ROLE session (services/shared/dbaccess/
      # audit_immutability_test.go). One-way and inert for `<schema>_svc`:
      # it never gains beekeepingit's privileges from this (Postgres role
      # membership doesn't flow backward).
      - name: beekeepingit
        ensure: present
        login: true
        inRoles:
          {{- range .Values.schemas }}
          - {{ . }}_svc
          {{- end }}
      # One combined role for the PowerSync service: `replication` to open a
      # logical-replication connection to `beekeepingit` (the `powersync`
      # publication above), and it also owns/uses `powersync_storage` (granted
      # by templates/schema-grants-job.yaml, since that DB is created — at
      # postInitSQL time, above — before this role exists). No isolation
      # benefit to splitting these into two roles; one process uses both.
      - name: powersync
        ensure: present
        login: true
        replication: true
        # Member of each synced schema's owning service role, so it inherits
        # SELECT on those tables for the initial replication snapshot — they're
        # owned by the least-privilege per-service `*_svc` roles, which neither
        # the app owner nor a non-superuser can GRANT on (#23 deploy).
        inRoles:
          {{- range .Values.syncedSchemas }}
          - {{ . }}_svc
          {{- end }}
        passwordSecret:
          name: powersync-credentials
{{- end }}
