{{/*
One per-service credential Secret per schema (D-6 "schema per service"). CNPG's
declarative role management (spec.managed.roles in cluster.yaml) does NOT
auto-generate passwords — it requires a pre-existing kubernetes.io/basic-auth
Secret named <schema>-svc-credentials with `username`/`password` keys, labelled
cnpg.io/reload so the operator picks up changes. Generated once via `lookup` +
`randAlphaNum` (preserved across `helm upgrade`, never a literal value in git —
NFR-SEC) rather than pre-created out of band.
*/}}
{{- if .Values.enabled }}
{{- range .Values.schemas }}
{{- $schema := . }}
{{- $secretName := printf "%s-svc-credentials" $schema }}
{{- $existing := lookup "v1" "Secret" $.Values.global.namespace $secretName }}
{{- $password := "" }}
{{- if $existing }}
{{- $password = index $existing.data "password" | b64dec }}
{{- else }}
{{- $password = randAlphaNum 32 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    {{- include "beekeepingit.labels" $ | nindent 4 }}
    app.kubernetes.io/name: postgres
    cnpg.io/reload: "true"
type: kubernetes.io/basic-auth
stringData:
  username: {{ printf "%s_svc" $schema }}
  password: {{ $password | quote }}
---
{{- end }}
{{/*
PowerSync's combined replication/storage role (cluster.yaml's managed.roles).
Also carries pre-composed connection URIs (PowerSync's config wants full
postgresql:// URIs, and CNPG's own generated Secrets — like this one — only
ever hold username/password parts, so we compose them once here rather than
inventing a URI-assembly step in the powersync subchart's Deployment).
*/}}
{{- $psSecretName := "powersync-credentials" }}
{{- $psExisting := lookup "v1" "Secret" .Values.global.namespace $psSecretName }}
{{- $psPassword := "" }}
{{- if $psExisting }}
{{- $psPassword = index $psExisting.data "password" | b64dec }}
{{- else }}
{{- $psPassword = randAlphaNum 32 }}
{{- end }}
{{- $psHost := printf "%s-rw" (include "postgres.fullname" .) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $psSecretName }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "beekeepingit.labels" . | nindent 4 }}
    app.kubernetes.io/name: postgres
    cnpg.io/reload: "true"
type: kubernetes.io/basic-auth
stringData:
  username: powersync
  password: {{ $psPassword | quote }}
  replication-uri: {{ printf "postgresql://powersync:%s@%s:5432/beekeepingit" $psPassword $psHost | quote }}
  storage-uri: {{ printf "postgresql://powersync:%s@%s:5432/powersync_storage" $psPassword $psHost | quote }}
{{- end }}
