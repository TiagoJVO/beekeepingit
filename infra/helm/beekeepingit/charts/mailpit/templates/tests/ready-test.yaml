{{/*
Readiness smoke for the Mailpit sink — run against a live cluster via
`helm test <release> -n <namespace>`: automatically in CI (helm-e2e.yml)
alongside the postgres PostGIS and Authentik readiness hooks. Probes Mailpit's
/readyz through the stable `mailpit` Service. The pod carries the same
`app.kubernetes.io/name: mailpit` label as the sink itself so the
`mailpit-ready-test-to-mailpit` NetworkPolicy edge (charts/networkpolicy)
covers its egress under the default-deny baseline.
*/}}
{{- if .Values.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: beekeepingit-mailpit-ready-test
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "beekeepingit.labels" . | nindent 4 }}
    app.kubernetes.io/name: mailpit
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: mailpit-ready-test
      image: busybox:1.37
      command:
        - wget
        - -qO-
        - --spider
        - http://mailpit:{{ .Values.httpPort }}/readyz
{{- end }}
