{{/*
Readiness smoke for the Mailpit sink — run against a live cluster via
`helm test <release> -n <namespace>`: automatically in CI (helm-e2e.yml)
alongside the postgres PostGIS and Authentik readiness hooks. Probes Mailpit's
/readyz through the stable `mailpit` Service. The pod carries the same
`app.kubernetes.io/name: mailpit` label as the sink itself so the
`mailpit-ready-test-to-mailpit` NetworkPolicy edge (charts/networkpolicy)
covers its egress under the default-deny baseline.

Bounded retry, not a single-shot wget (#366): helm-e2e's backoff-reset step
(`kubectl rollout restart -l app.kubernetes.io/part-of=beekeepingit`) re-rolls
THIS deployment right before `helm test`, and the readiness probe correctly
keeps the replacement pod out of the Service until its listener accepts — so
for a short window the Service legitimately has zero ready endpoints and a
one-shot probe dies on "Connection refused" (observed live: the old pod was
killed ~4s before the hook ran). The Authentik ready-test can stay one-shot
only because that deployment is NOT part-of-labeled (external HelmRelease)
and never gets re-rolled by that step.
*/}}
{{- if .Values.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: beekeepingit-mailpit-ready-test
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "beekeepingit.labels" . | nindent 4 }}
    app.kubernetes.io/name: mailpit
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: mailpit-ready-test
      image: busybox:1.37
      command:
        - /bin/sh
        - -c
        - |
          for i in $(seq 1 12); do
            if wget -qO- --spider "http://mailpit:{{ .Values.httpPort }}/readyz"; then
              echo "mailpit ready after ~$(( (i - 1) * 5 ))s"
              exit 0
            fi
            sleep 5
          done
          echo "mailpit never became ready within 60s" >&2
          exit 1
{{- end }}
