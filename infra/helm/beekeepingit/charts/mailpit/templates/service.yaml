{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  # Bare, release-independent name (like the sibling `powersync`/`apiaries`
  # Services): charts/authentik's `email.host` default (rendered into the
  # AUTHENTIK_EMAIL__HOST env of a Secret a SEPARATE Flux HelmRelease consumes)
  # must resolve it identically whether the umbrella runs as `beekeepingit`
  # (local helm) or Flux's derived release name.
  name: mailpit
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "beekeepingit.labels" . | nindent 4 }}
    app.kubernetes.io/name: mailpit
spec:
  selector:
    app.kubernetes.io/name: mailpit
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: smtp
      port: {{ .Values.smtpPort }}
      targetPort: {{ .Values.smtpPort }}
    - name: http
      port: {{ .Values.httpPort }}
      targetPort: {{ .Values.httpPort }}
{{- end }}
