{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "smoke.fullname" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "beekeepingit.labels" . | nindent 4 }}
    app.kubernetes.io/name: smoke
spec:
  selector:
    app.kubernetes.io/name: smoke
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: 80
      targetPort: 8080
{{- end }}
