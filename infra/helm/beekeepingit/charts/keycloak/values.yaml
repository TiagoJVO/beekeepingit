# Defaults for standalone `helm template`/`helm lint` of this subchart in
# isolation. When installed as part of the umbrella, these are overridden by the
# `keycloak:` key in the parent's values.yaml/environments/*.yaml.
#
# This chart only creates the supplementary admin-credential Secret and realm
# ConfigMap — Keycloak itself is a separate Flux `HelmRelease`
# (infra/gitops/apps/dev/keycloak-helmrelease.yaml) that references these two
# resources by name. See ADR-0012.
enabled: true

# Dev/CI-grade realm seed matching docs/architecture/walking-skeleton.md
# §4.5/§7.2 — #23 reuses this rather than redoing it. Production realm
# config/hardening is EPIC-14 (see ADR-0010).
realmFile: beekeepingit-realm.json

# Placeholder for standalone rendering only — the umbrella always injects the
# real global.* via its own values.yaml.
global:
  namespace: beekeepingit
