apiVersion: v2
name: keycloak
description: >-
  Wraps the vendored community `codecentric/keycloakx` chart (D-7) with the
  BeekeepingIT-specific bits it can't own itself: a generated admin-bootstrap
  credential and the dev/CI-grade realm import (realm `beekeepingit`, client
  `beekeepingit-pwa`, one test user) already designed in
  docs/architecture/walking-skeleton.md §4.5/§7.2 for #23 to reuse. See ADR-0008.
type: application
version: 0.1.0
appVersion: "0.1.0"
dependencies:
  - name: keycloakx
    version: "7.2.0"
    repository: "https://codecentric.github.io/helm-charts"
