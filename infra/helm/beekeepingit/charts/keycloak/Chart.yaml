apiVersion: v2
name: keycloak
description: >-
  BeekeepingIT-specific supplementary resources for Keycloak (D-7): a generated
  admin-bootstrap credential and the dev/CI-grade realm import (realm `beekeepingit`,
  client `beekeepingit-pwa`, one test user) already designed in
  docs/architecture/walking-skeleton.md §4.5/§7.2 for #23 to reuse. Keycloak itself
  (the vendored `codecentric/keycloakx` chart) is deployed separately as its own Flux
  `HelmRelease` (`infra/gitops/apps/dev/keycloak-helmrelease.yaml`) — not nested here —
  since Flux's GitRepository-sourced charts don't recursively resolve a subchart's own
  vendored dependency. See ADR-0012.
type: application
version: 0.1.0
appVersion: "0.1.0"
