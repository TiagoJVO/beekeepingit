{{/*
Generated bootstrap admin password (never a literal value in git — NFR-SEC),
via the standard Helm `lookup` (preserve existing value on `helm upgrade`) +
`randAlphaNum` (generate on first install) idiom. `lookup` always returns nil
during `helm template`/`helm lint` (no live cluster), so CI always takes the
"generate fresh" branch — harmless there since nothing is applied to a real
cluster.
*/}}
{{- if .Values.enabled }}
{{- $secretName := printf "%s-keycloak-admin-credentials" .Release.Name }}
{{- $existing := lookup "v1" "Secret" .Values.global.namespace $secretName }}
{{- $password := "" }}
{{- if $existing }}
{{- $password = index $existing.data "password" | b64dec }}
{{- else }}
{{- $password = randAlphaNum 32 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "beekeepingit.labels" . | nindent 4 }}
    app.kubernetes.io/name: keycloak
type: Opaque
stringData:
  password: {{ $password | quote }}
{{- end }}
