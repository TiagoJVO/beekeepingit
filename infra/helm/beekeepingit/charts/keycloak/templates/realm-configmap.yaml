{{/*
Dev/CI-grade realm import — see files/beekeepingit-realm.json and the note in
Chart.yaml. Mounted by keycloakx via extraVolumes/extraVolumeMounts in
values.yaml (keycloakx.extraVolumes references this ConfigMap by name).
*/}}
{{- if .Values.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-keycloak-realm-import" .Release.Name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "beekeepingit.labels" . | nindent 4 }}
    app.kubernetes.io/name: keycloak
data:
  {{ .Values.realmFile }}: |
    {{- .Files.Get (printf "files/%s" .Values.realmFile) | nindent 4 }}
{{- end }}
