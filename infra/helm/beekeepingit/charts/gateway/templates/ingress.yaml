{{/*
Plain networking.k8s.io/v1 Ingress (not Traefik's IngressRoute CRD) so the
controller can be swapped later (NFR-ARC-2) — k3d's bundled Traefik already
satisfies `ingressClassName: traefik` today. Two hosts (ADR-0016,
oidc-integration.md §2): the app host fans out to the slice's services per
`.Values.routes`, and the auth host routes everything to Authentik per
`.Values.authRoutes`. One TLS Secret with both hostnames in its SAN terminates
both. Confirm the backend Service names at deploy and adjust if any differ.
*/}}
{{- if .Values.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "gateway.fullname" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "beekeepingit.labels" . | nindent 4 }}
    app.kubernetes.io/name: gateway
spec:
  ingressClassName: {{ .Values.ingressClassName }}
  tls:
    - hosts:
        - {{ .Values.appHost }}
        - {{ .Values.authHost }}
      secretName: {{ include "gateway.fullname" . }}-tls
  rules:
    - host: {{ .Values.appHost }}
      http:
        paths:
          {{- range .Values.routes }}
          - path: {{ .path }}
            pathType: Prefix
            backend:
              service:
                name: {{ .service }}
                port:
                  number: {{ .port }}
          {{- end }}
    - host: {{ .Values.authHost }}
      http:
        paths:
          {{- range .Values.authRoutes }}
          - path: {{ .path }}
            pathType: Prefix
            backend:
              service:
                name: {{ .service }}
                port:
                  number: {{ .port }}
          {{- end }}
{{- end }}
