{{/*
Plain networking.k8s.io/v1 Ingress (not Traefik's IngressRoute CRD) so the
controller can be swapped later (NFR-ARC-2) — k3d's bundled Traefik already
satisfies `ingressClassName: traefik` today.

`backend.serviceName`/`servicePort` default to the keycloak subchart's
Service as generated by the vendored keycloakx chart's own fullname/service
templates (release name + chart name, its `service.httpPort`). Confirm the
actual name once `helm template`/a live install is available (this repo's
Windows dev session has no helm/kubectl on PATH — see FOLLOWUPS.md) and adjust
`gateway.backend.serviceName` in values.yaml if it differs.
*/}}
{{- if .Values.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "gateway.fullname" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "beekeepingit.labels" . | nindent 4 }}
    app.kubernetes.io/name: gateway
spec:
  ingressClassName: {{ .Values.ingressClassName }}
  tls:
    - hosts:
        - {{ .Values.host }}
      secretName: {{ include "gateway.fullname" . }}-tls
  rules:
    - host: {{ .Values.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.backend.serviceName }}
                port:
                  number: {{ .Values.backend.servicePort }}
{{- end }}
