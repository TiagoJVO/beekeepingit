{{/*
Self-signed dev TLS cert via Helm's built-in genSelfSignedCert (no cert-manager
dependency — trusted-cert issuance is EPIC-14 scope). Generated once via the
standard `lookup` (preserve existing cert/key across `helm upgrade`, so it
doesn't rotate — and browsers/clients that trusted it once stay valid) +
generate-on-first-install idiom used by the other subcharts' credentials.
*/}}
{{- if .Values.enabled }}
{{- $secretName := printf "%s-tls" (include "gateway.fullname" .) }}
{{- $existing := lookup "v1" "Secret" .Values.global.namespace $secretName }}
{{- $cert := "" }}
{{- $key := "" }}
{{- if $existing }}
{{- $cert = index $existing.data "tls.crt" | b64dec }}
{{- $key = index $existing.data "tls.key" | b64dec }}
{{- else }}
{{- $generated := genSelfSignedCert .Values.host nil (list .Values.host) (.Values.selfSignedCertDays | int) }}
{{- $cert = $generated.Cert }}
{{- $key = $generated.Key }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "beekeepingit.labels" . | nindent 4 }}
    app.kubernetes.io/name: gateway
type: kubernetes.io/tls
data:
  tls.crt: {{ $cert | b64enc }}
  tls.key: {{ $key | b64enc }}
{{- end }}
