{{/*
Self-signed dev TLS cert via Helm's built-in genSelfSignedCert (no cert-manager
dependency — trusted-cert issuance is EPIC-14 scope). Covers BOTH gateway hosts
(app + auth, ADR-0016) in its SAN so one Secret terminates both Ingress hosts.

Generated once via the standard `lookup` (preserve existing cert/key across
`helm upgrade`, so it doesn't rotate — clients that trusted it once stay valid) +
generate-on-first-install idiom used by the other subcharts' credentials. The
covered host set is recorded in an annotation; if it ever changes (e.g. the
historical single-host `keycloak.*` cert on an already-provisioned cluster, or a
future host rename), the stored cert no longer matches and is regenerated for the
current hosts rather than silently serving a cert missing a SAN.
*/}}
{{- if .Values.enabled }}
{{- $secretName := printf "%s-tls" (include "gateway.fullname" .) }}
{{- $hosts := list .Values.appHost .Values.authHost }}
{{- $hostsKey := join "," $hosts }}
{{- $existing := lookup "v1" "Secret" .Values.global.namespace $secretName }}
{{- $cert := "" }}
{{- $key := "" }}
{{- if and $existing (eq (dig "metadata" "annotations" "gateway.beekeepingit/tls-hosts" "" $existing) $hostsKey) }}
{{- $cert = index $existing.data "tls.crt" | b64dec }}
{{- $key = index $existing.data "tls.key" | b64dec }}
{{- else }}
{{- $generated := genSelfSignedCert .Values.appHost nil $hosts (.Values.selfSignedCertDays | int) }}
{{- $cert = $generated.Cert }}
{{- $key = $generated.Key }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "beekeepingit.labels" . | nindent 4 }}
    app.kubernetes.io/name: gateway
  annotations:
    gateway.beekeepingit/tls-hosts: {{ $hostsKey | quote }}
type: kubernetes.io/tls
data:
  tls.crt: {{ $cert | b64enc }}
  tls.key: {{ $key | b64enc }}
{{- end }}
