# Defaults for standalone `helm template`/`helm lint` of this subchart in
# isolation. When installed as part of the umbrella, these are overridden by the
# `gateway:` key in the parent's values.yaml/environments/*.yaml.
enabled: true

# Two local dev hostnames (k3d maps host 8443 -> 443, see infra/README.md). Add
# BOTH to /etc/hosts (or use `curl --resolve`) to reach them from outside the
# cluster. Split per ADR-0016 / oidc-integration.md §2:
#   appHost  — the PWA (`/`) + Go APIs (`/v1/*`) + PowerSync (`/sync-stream`).
#   authHost — Authentik (issuer + all its paths), routed to its own Service.
# A dedicated auth origin keeps the app origin cross-origin-isolated (COOP/COEP →
# SharedArrayBuffer for PowerSync) and avoids Authentik's broad root paths
# (/api, /static, /media, /-, /if, root files) colliding with the PWA `/` catch-all.
appHost: app.beekeepingit.local
authHost: auth.beekeepingit.local

# App-host path-based routes fanned out to the slice's services
# (walking-skeleton.md §5.3). Longest-prefix wins, so order is not significant to
# k8s Ingress; listed specific→general for readability. The Go services / PWA use
# the bare Service names from the `services`/`pwa` subcharts.
routes:
  - { path: /v1/apiaries, service: apiaries, port: 8080 }
  - { path: /v1/activities, service: activities, port: 8080 }
  - { path: /v1/journeys, service: journeys, port: 8080 }
  - { path: /v1/organizations, service: organizations, port: 8080 }
  - { path: /v1/profile, service: identity, port: 8080 }
  - { path: /v1/sync, service: sync, port: 8080 }
  - { path: /, service: pwa, port: 80 }

# Auth-host catch-all → the Authentik server Service (its own Flux HelmRelease
# "authentik", ADR-0012/ADR-0016 → Service "authentik-server"). Authentik serves
# the issuer and all its endpoints under root, so this host routes everything to it.
authRoutes:
  - { path: /, service: authentik-server, port: 80 }

# PowerSync's client appends its own paths (e.g. `/sync/stream`) to the endpoint,
# and the PowerSync service serves those at the **root** — so this `/sync-stream`
# prefix must be **stripped** before the request reaches it. Validated live (#23):
# without stripping, the request fell through to the PWA SPA fallback (200 HTML)
# and download sync silently never ran. Rendered as its own Ingress + a Traefik
# StripPrefix Middleware (templates/powersync-route.yaml) so the main Ingress
# above stays a plain, controller-agnostic object; only this one route is
# Traefik-specific. Served on the app host.
powersyncRoute:
  path: /sync-stream
  service: powersync
  port: 8080

ingressClassName: traefik
selfSignedCertDays: 365

# Trusted TLS via cert-manager (EPIC-14 scope originally, brought forward for
# the staging environment, D-26) — mutually exclusive with the self-signed
# cert templates/tls-secret.yaml generates: when enabled, that template skips
# entirely and cert-manager's ingress-shim (watching for the annotation below)
# creates/renews the same-named TLS Secret itself via ACME HTTP-01. Off by
# default — dev keeps the self-signed cert, no ACME account/rate-limit
# concerns for a local cluster with no public endpoint.
certManager:
  enabled: false
  # Name of a cluster-scoped ClusterIssuer (not templated here — it's cluster
  # infrastructure, not release-scoped; see the beekeepingit-gitops repo's clusters/staging/
  # cert-manager-issuer.yaml).
  clusterIssuer: ""

# Placeholder for standalone rendering only — the umbrella always injects the
# real global.* via its own values.yaml.
global:
  namespace: beekeepingit
