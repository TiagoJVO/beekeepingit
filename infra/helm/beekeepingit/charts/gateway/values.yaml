# Defaults for standalone `helm template`/`helm lint` of this subchart in
# isolation. When installed as part of the umbrella, these are overridden by the
# `gateway:` key in the parent's values.yaml/environments/*.yaml.
enabled: true

# Local dev hostname (k3d maps host 8443 -> 443, see infra/README.md). Add it to
# /etc/hosts (or use `curl --resolve`) to reach it from outside the cluster.
host: keycloak.beekeepingit.local

# Path-based routes fanned out from the single gateway host to the slice's
# services (walking-skeleton.md §5.3). Longest-prefix wins, so order is not
# significant to k8s Ingress; listed specific→general for readability.
# Keycloak is its own Flux HelmRelease "keycloak" (ADR-0012) → Service
# "keycloak-keycloakx-http". The Go services / PWA use the bare Service names
# from the `services`/`pwa`/`powersync` subcharts.
routes:
  - { path: /realms, service: keycloak-keycloakx-http, port: 80 }
  - { path: /resources, service: keycloak-keycloakx-http, port: 80 }
  - { path: /v1/apiaries, service: apiaries, port: 8080 }
  - { path: /v1/sync, service: sync, port: 8080 }
  - { path: /, service: pwa, port: 80 }

# PowerSync's client appends its own paths (e.g. `/sync/stream`) to the endpoint,
# and the PowerSync service serves those at the **root** — so this `/sync-stream`
# prefix must be **stripped** before the request reaches it. Validated live (#23):
# without stripping, the request fell through to the PWA SPA fallback (200 HTML)
# and download sync silently never ran. Rendered as its own Ingress + a Traefik
# StripPrefix Middleware (templates/powersync-route.yaml) so the main Ingress
# above stays a plain, controller-agnostic object; only this one route is
# Traefik-specific.
powersyncRoute:
  path: /sync-stream
  service: powersync
  port: 8080

ingressClassName: traefik
selfSignedCertDays: 365

# Placeholder for standalone rendering only — the umbrella always injects the
# real global.* via its own values.yaml.
global:
  namespace: beekeepingit
