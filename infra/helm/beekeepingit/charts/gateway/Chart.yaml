apiVersion: v2
name: gateway
description: >-
  Ingress + TLS termination for the platform, reusing k3d's already-running
  Traefik (no second ingress controller installed) via a portable
  `networking.k8s.io/v1 Ingress` (not a Traefik-specific CRD, so the controller
  can be swapped later per NFR-ARC-2). TLS is a Helm-generated self-signed
  cert — trusted-cert issuance (cert-manager) is EPIC-14 scope. See ADR-0009.
type: application
version: 0.1.0
appVersion: "0.1.0"
