{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "powersync.fullname" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "beekeepingit.labels" . | nindent 4 }}
    app.kubernetes.io/name: powersync
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: powersync
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: powersync
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        # Force a rollout when the config content changes (ConfigMap updates
        # don't otherwise trigger a re-read of mounted files).
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      # Hardened pod/container security context, partial (EPIC-14 #89,
      # NFR-SEC-1, trivy-config KSV-0014/KSV-0118). `journeyapps/
      # powersync-service` is a third-party image with no in-repo Dockerfile
      # to inspect — its runtime user and whether it writes to its own root
      # filesystem (e.g. Node/npm caches) aren't verified against a live
      # cluster here (no live cluster in CI, #89's constraint). Applying
      # `runAsNonRoot`/`readOnlyRootFilesystem` unverified risks a silent
      # crash-loop (wrong UID / a write it needs rejected) that only a real
      # deploy would catch. So this sets only the parts safe regardless of
      # the image's internals; `runAsNonRoot`/`readOnlyRootFilesystem` are
      # deferred to a follow-up once validated against a real rollout (see
      # FOLLOWUPS.md).
      containers:
        - name: powersync
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          # `args:`, not `command:` — overriding `command:` skips the image's
          # own entrypoint script (SP-1 spike's k8s gotcha note).
          args: ["start", "-r", "unified"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: {{ .Values.port }}
          env:
            # The image looks for /app/powersync.yaml by default — it doesn't
            # infer a config path from the mounted volume, this env var is the
            # documented way to point it elsewhere (confirmed against
            # powersync-ja/self-host-demo's reference docker-compose service).
            - name: POWERSYNC_CONFIG_PATH
              value: /config/service.yaml
            - name: PS_PORT
              value: {{ .Values.port | quote }}
            - name: PS_DATA_SOURCE_URI
              valueFrom:
                secretKeyRef:
                  name: powersync-credentials
                  key: replication-uri
            - name: PS_STORAGE_SOURCE_URI
              valueFrom:
                secretKeyRef:
                  name: powersync-credentials
                  key: storage-uri
            - name: PS_JWKS_URL
              value: {{ .Values.auth.jwksUrl | quote }}
          volumeMounts:
            - name: config
              mountPath: /config
          # Same liveness endpoint as the reference self-host-demo's
          # docker-compose healthcheck, translated to k8s probes — without
          # these, a crashing config/replication/storage connection still
          # reports `Ready` (no probe = "ready as soon as the process
          # starts"). startupProbe gives the initial replication/storage
          # connection room to settle (up to 150s) before liveness/readiness
          # start enforcing their own tighter timing.
          startupProbe:
            httpGet:
              path: /probes/liveness
              port: {{ .Values.port }}
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /probes/liveness
              port: {{ .Values.port }}
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /probes/liveness
              port: {{ .Values.port }}
            periodSeconds: 5
          resources:
            {{- index .Values.global.resources .Values.resourceTier | toYaml | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "powersync.fullname" . }}-config
{{- end }}
