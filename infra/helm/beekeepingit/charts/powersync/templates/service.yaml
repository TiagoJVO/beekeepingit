{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "powersync.fullname" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "beekeepingit.labels" . | nindent 4 }}
    app.kubernetes.io/name: powersync
spec:
  selector:
    app.kubernetes.io/name: powersync
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
{{- end }}
