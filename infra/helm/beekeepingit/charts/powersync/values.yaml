# Defaults for standalone `helm template`/`helm lint` of this subchart in
# isolation. When installed as part of the umbrella, these are overridden by
# the `powersync:` key in the parent's values.yaml/environments/*.yaml.
enabled: true

image:
  repository: journeyapps/powersync-service
  tag: "1.23.2"
resourceTier: medium
port: 8080

# LOCAL-DEV STOPGAP (#22): no per-org sync-token connector exists yet (that's
# #23/#106's job — docs/architecture/sync.md, ADR-0006). jwksUrl below points
# at Keycloak's own realm JWKS endpoint instead, so the service has *a*
# working JWKS source to validate against — this accepts any token signed by
# that realm's keys, not a sync-scoped token. Replace with the real
# `/v1/sync/token` connector endpoint once #23/#106 land (see FOLLOWUPS.md).
auth:
  jwksUrl: http://keycloak-keycloakx-http/realms/beekeepingit/protocol/openid-connect/certs
  audience:
    - powersync-dev
    - powersync

# Placeholder sync-config (#22): no domain tables exist yet (apiaries/
# organizations land with #23), so this can't reference them like the SP-1
# spike's prototype config did. PowerSync's sync-rules query validator
# requires a result column selecting from an actual table (a literal
# `SELECT 1 WHERE false` fails that static check), so this points at
# Postgres's own always-present `pg_catalog.pg_tables` — `WHERE false` means
# it never actually returns/replicates a row. `auto_subscribe: false` keeps
# any client from subscribing to it. Replaced by the real org-scoped Sync
# Rules design (ADR-0006, docs/architecture/sync.md) once #23 lands — tracked
# in FOLLOWUPS.md.
syncConfig:
  config:
    edition: 3
  streams:
    placeholder:
      auto_subscribe: false
      query: "SELECT schemaname AS id FROM pg_catalog.pg_tables WHERE false"

# Placeholder for standalone rendering only — the umbrella always injects the
# real global.* via its own values.yaml.
global:
  namespace: beekeepingit
  resources:
    medium:
      requests: { cpu: 100m, memory: 128Mi }
      limits: { cpu: 250m, memory: 256Mi }
