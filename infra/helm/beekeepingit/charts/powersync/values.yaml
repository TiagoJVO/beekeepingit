# Defaults for standalone `helm template`/`helm lint` of this subchart in
# isolation. When installed as part of the umbrella, these are overridden by
# the `powersync:` key in the parent's values.yaml/environments/*.yaml.
enabled: true

image:
  repository: journeyapps/powersync-service
  tag: "1.23.2"
resourceTier: medium
port: 8080

# Real sync-token JWKS (#23/#106, replaces #22's OIDC-realm stopgap): the
# `sync` service mints the short-TTL, org-scoped PowerSync token
# (GET /v1/sync/token) and serves the matching public keys here. `audience`
# must match the sync service's SYNC_TOKEN_AUDIENCE. `allow_local_jwks: true`
# (set in the configmap) permits this internal `http://` URL.
auth:
  jwksUrl: http://sync:8080/internal/sync/jwks.json
  audience:
    - powersync

# Real org-scoped Sync Rules (#23/#106, replaces #22's pg_tables placeholder —
# docs/architecture/sync.md §3.4, ADR-0006). A device receives ONLY its active
# organization's data: every `apiaries` row of that org plus the one
# `organizations` row. The org is taken from the sync token's `organization_id`
# claim (`request.jwt()`), so tenancy layer 3 (ADR-0002) is exercised even with
# a single seeded org.
#
# Uses classic `bucket_definitions` (the documented org-scoping pattern):
# `request.jwt()` is only valid there, NOT in edition-3 streams (validated live
# — the engine rejects `request.jwt()` in a stream query with "Invalid schema in
# function name", #23 deploy). The bucket is parameterized on the sync token's
# `organization_id` claim; `deleted_at IS NULL` drops tombstoned rows so a
# server-side delete propagates as a local delete (sync.md §4.5).
#
# apiaries.apiaries: an explicit column list, NOT `SELECT *` — the raw
# `location` column is a PostGIS `geography(Point,4326)` and streams to the
# client in a wire form (EWKB) the Dart/SQLite side has no parser for.
# ST_X/ST_Y(location) instead project it to plain nullable double-precision
# lon/lat columns (`location_lon`/`location_lat`), which PowerSync replicates
# as ordinary SQLite REAL columns the client can read directly, no WKB parsing
# needed. Deliberately no `::geometry` cast here (unlike the Go service's own
# SQL, where PostGIS applies it implicitly) — PowerSync's sync-rules SQL
# parser only supports CAST to text/numeric/integer/real/blob, not PostGIS
# types, and fatals replication with "CAST not supported for 'geometry'" if
# one is present; ST_X/ST_Y already accept `geography` directly (PowerSync
# GIS support, docs.powersync.com/client-sdks/advanced/gis-data-postgis), so
# the cast was both unsupported and unnecessary. NULL when an apiary has no
# stored location (both columns nullable, matching the DB column's own
# optionality). Both #33 (offline proximity ordering, FR-AP-2 — "the list
# works offline... using an offline distance computation") and #34/#37 (map
# view + offline distance measurement, FR-AP-3/FR-AP-5) need these same two
# columns client-side, so this one bucket entry covers all three — don't
# duplicate it if you touch this file again for related work.
#
# Because the list is explicit, it must stay a SUPERSET of the client's local
# schema (client/lib/core/sync/powersync_schema.dart): a column missing here
# doesn't error anywhere — it silently stays NULL on every device that didn't
# write it locally. `notes` (FR-AP-8, #196) was lost exactly that way when
# #33's rewrite of this entry (from `SELECT *` to the explicit list) landed in
# parallel with #196 adding the column; the walking-skeleton e2e's fresh-client
# notes assertion (client/e2e/tests/slice.spec.ts) now guards against a repeat.
#
# apiaries.audit_log and apiaries.sync_conflict_log (#61, history.md §6
# "recent history is offline-viewable" / "LWW losers... surfaced as a
# superseded timeline event") are included read-only in the same org bucket,
# matching the flat unfiltered-`SELECT *` style already used for the other two
# tables below — no other bucket entry here is time/row-bounded either. history.md
# §6 calls for a "recent window", not the unbounded log, but Sync Rules'
# bucket `data` queries don't support a LIMIT/pagination clause (they define
# a continuously-replicated row set, not a point-in-time page) and per-service
# audit volume is small (§3 "Trade-off (accepted)" — bounded by real change
# volume). So v1 replicates the full per-org history down, same as every
# other bucket row; a time-bounded WHERE (e.g. `recorded_at > now() -
# interval`) would need re-evaluation server-side to keep rolling forward,
# which Sync Rules also doesn't do — that refinement is deferred (tracked in
# FOLLOWUPS.md) rather than approximated here.
#
# apiaries.apiary_counters (#256, FR-AP-7): typed 1-N counters decoupled from
# the apiaries table — hive_count is no longer a column on apiaries.apiaries
# (retired by that service's migration 00005), so it is gone from the
# apiaries SELECT below and the per-type counter rows stream instead. The
# publication needs no change: it is schema-scoped (`FOR TABLES IN SCHEMA
# apiaries, ...`, charts/postgres/templates/cluster.yaml), so the new table
# is captured automatically. No `deleted_at` filter — counters have no
# tombstone of their own (a counter is always either the current value or
# absent; its apiary's tombstone already removes the apiary — and with it
# every dependent read — from the device's slice).
#
# place_label (#252, migration 00006): a plain nullable text column, added to
# the explicit apiaries SELECT alongside name — no ST_X/ST_Y-style projection
# needed (unlike location, it's already client-representable SQL text).
# IMPORTANT: because this list is explicit (not `SELECT *`), it must stay a
# SUPERSET of the client's local schema (powersync_schema.dart) — a column
# missing here doesn't error anywhere, it silently stays NULL on every device
# that didn't write it locally itself. Every additive apiaries.apiaries
# column needs a matching addition here in the SAME change that adds it
# server-side, not a follow-up.
syncConfig:
  bucket_definitions:
    by_organization:
      parameters: SELECT request.jwt() ->> 'organization_id' AS organization_id
      data:
        - SELECT id, organization_id, name, notes, place_label, created_at,
          updated_at, ST_X(location) AS location_lon, ST_Y(location) AS location_lat
          FROM apiaries.apiaries WHERE organization_id = bucket.organization_id AND deleted_at IS NULL
        - SELECT * FROM apiaries.apiary_counters WHERE organization_id = bucket.organization_id
        - SELECT * FROM organizations.organizations WHERE id = bucket.organization_id
        - SELECT * FROM apiaries.audit_log WHERE organization_id = bucket.organization_id
        - SELECT * FROM apiaries.sync_conflict_log WHERE organization_id = bucket.organization_id
        # activities.activities (#39, FR-OF-1): stream the org's activities to
        # the device so an offline-created activity reconciles across devices.
        # Explicit column list matching the client's local schema
        # (client/lib/core/sync/powersync_schema.dart's activities Table —
        # NOT recorded_at/deleted_at, which the client doesn't declare), same
        # additive-safety rationale as the apiaries.apiaries entry above.
        # deleted_at IS NULL so a server-side tombstone leaves the client's
        # result set (#41's delete path). The activities schema is in the
        # powersync publication (charts/postgres syncedSchemas).
        - SELECT id, organization_id, apiary_id, performed_by, journey_id, type,
          occurred_at, attributes, created_at, updated_at
          FROM activities.activities WHERE organization_id = bucket.organization_id AND deleted_at IS NULL
        # todos.todos (#50, FR-OF-1, FR-TD-1): stream the org's todos to the
        # device so an offline create/edit/complete/reopen/delete reconciles
        # across devices. Explicit column list matching the client's local
        # schema (client/lib/core/sync/powersync_schema.dart's todos Table —
        # NOT recorded_at/deleted_at, which the client doesn't declare), same
        # additive-safety rationale as the apiaries.apiaries/activities.activities
        # entries above. deleted_at IS NULL so a server-side tombstone leaves
        # the client's result set. Only todos.todos streams — NOT its own
        # audit_log/sync_conflict_log (unlike apiaries', which are included
        # read-only above for #61's combined history timeline; todos has no
        # such read surface yet). The todos schema is in the powersync
        # publication (charts/postgres syncedSchemas).
        - SELECT id, organization_id, title, description, due_date, priority,
          status, completed_at, assignee_id, created_at, updated_at
          FROM todos.todos WHERE organization_id = bucket.organization_id AND deleted_at IS NULL

# Placeholder for standalone rendering only — the umbrella always injects the
# real global.* via its own values.yaml.
global:
  namespace: beekeepingit
  resources:
    medium:
      requests: { cpu: 100m, memory: 128Mi }
      limits: { cpu: 250m, memory: 256Mi }
