{{/*
Baseline: deny all ingress and egress for every pod this chart manages the
policy for (see the exclusions below), then the other templates in this chart
punch narrow, explicit holes for the real traffic flows (gateway->services,
services->postgres, powersync->postgres, service->service, DNS, OTel, CNPG
operator plumbing). Applies regardless of which Helm release/HelmRelease owns
a given pod (Authentik's Deployments included, even though this chart doesn't
manage them) — NetworkPolicy is a namespace-scoped core API object
(networking.k8s.io/v1), not tied to a release.

ENFORCEMENT (corrected after PR #224's first CI round): NetworkPolicy IS
enforced on k3d/k3s. k3s embeds kube-router's network-policy controller,
which enforces these policies even though the CNI itself is Flannel (which
has no netpol support of its own) — the first push of #224 wrongly assumed
"Flannel CNI => not enforced" and immediately broke the CI k3d install (the
CNPG cluster couldn't reconcile, so the postgres schema-grants hook timed
out: DeadlineExceeded). Every rule in this chart is therefore LIVE on local
dev and the CI k3d job, not just declarative intent for some future CNI.

EXCLUSIONS (scope, documented honestly): the podSelector below deliberately
does NOT select the observability stack's pods or MinIO's pods, even though
both deploy into this same namespace (their own Flux HelmReleases, ADR-0012/
ADR-0013):

  - observability (kube-prometheus-stack/loki/tempo/otel-collector/
    alert-webhook-sink): a web of internal flows across four vendored
    third-party charts — otel-collector -> Loki/Tempo/Prometheus, Grafana ->
    Loki/Tempo/Prometheus, Prometheus scraping every component, Alertmanager
    -> alert-webhook-sink, the operator's admission webhook — whose pod
    labels and ports aren't all verifiable without a live cluster. Helm-owned
    pods carry `app.kubernetes.io/instance: observability` (the pinned
    releaseName); the Prometheus/Alertmanager pods the operator creates carry
    `app.kubernetes.io/managed-by: prometheus-operator` instead — both
    excluded below.
  - minio: reached by Loki/Tempo (excluded above) and by its own
    post-install bucket job; its chart uses legacy `release: minio` pod
    labels. Excluded so the storage the observability stack depends on isn't
    black-holed along with it.

  A NotIn matchExpression also matches pods that LACK the label entirely, so
  every other pod in the namespace (this umbrella's own workloads, Authentik's
  server/worker/Postgres) IS selected and default-denied — the exclusions
  only carve out the two releases named above. Since enforcement is real
  (above), denying them without enumerated allow rules would break dev
  observability/MinIO on the next Flux reconcile — a breakage CI can't catch
  (helm-e2e.yml deploys only the umbrella + Authentik). Enumerating their
  edges live and removing these exclusions is tracked on issue #89.
*/}}
{{- if .Values.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "beekeepingit.labels" . | nindent 4 }}
    app.kubernetes.io/name: networkpolicy
spec:
  # Shared with allow-dns.yaml via the helper so the deny-set and the
  # egress-whitelist-set can't drift apart (see _helpers.tpl).
  podSelector:
    {{- include "networkpolicy.managedPodSelector" . | nindent 4 }}
  policyTypes: ["Ingress", "Egress"]
{{- end }}
