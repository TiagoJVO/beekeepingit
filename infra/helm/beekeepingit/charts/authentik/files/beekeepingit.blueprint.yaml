version: 1
metadata:
  name: beekeepingit
  labels: { blueprints.goauthentik.io/instantiate: "true" }
entries:
  - model: authentik_core.group
    id: group-platform-operator
    identifiers: { name: platform-operator }
    attrs: { name: platform-operator }
  - model: authentik_core.user
    id: user-test-beekeeper
    identifiers: { username: test.beekeeper@beekeepingit.local }
    attrs:
      username: test.beekeeper@beekeepingit.local
      name: Test Beekeeper
      email: test.beekeeper@beekeepingit.local
      is_active: true
      path: users
      # upn: sub_mode=user_upn => sub = this UUID (devseed pins it).
      # email_verified: seeded VERIFIED (#361) — this is a dev/CI-provisioned trusted
      # account (the address isn't a real inbox), and the walking-skeleton e2e's login
      # must not detour through the verification email stage below. Seeding the
      # attribute is also the documented escape hatch for ops-provisioned accounts
      # whose address was verified out-of-band.
      attributes: { upn: "11111111-1111-4111-8111-111111111111", email_verified: true }
      groups: [!KeyOf group-platform-operator]
      password: dev-password123
  # Second dev/CI seed user, deliberately UNVERIFIED (#361): the verification-flow
  # e2e (client/e2e/tests/verification.spec.ts) logs in as this user, expects the
  # email stage to gate the login, completes it via the Mailpit-captured link, and
  # asserts the id_token then carries email_verified=true. No group, no org
  # membership (devseed doesn't know it) — after verifying it lands on onboarding.
  - model: authentik_core.user
    id: user-unverified-beekeeper
    identifiers: { username: unverified.beekeeper@beekeepingit.local }
    attrs:
      username: unverified.beekeeper@beekeepingit.local
      name: Unverified Beekeeper
      email: unverified.beekeeper@beekeepingit.local
      is_active: true
      path: users
      attributes: { upn: "22222222-2222-4222-8222-222222222222" }
      password: dev-password123
  # Custom `email` scope mapping (#361, NFR-SEC-1): emits the user's GENUINE
  # verification state instead of the built-in managed mapping's hardcoded value.
  # Note the built-in hardcodes `email_verified: False` on the pinned 2026.5.4
  # (changed from `True` in Authentik 2025.10) — either constant is cosmetic; this
  # mapping reads the `email_verified` user attribute that the verification flow
  # below sets on completion. The strict `is True` check fails closed on any
  # non-boolean junk an attribute could hold.
  - model: authentik_providers_oauth2.scopemapping
    id: scope-email-verified
    identifiers: { name: "BeekeepingIT OAuth Mapping: OpenID 'email' (real email_verified)" }
    attrs:
      name: "BeekeepingIT OAuth Mapping: OpenID 'email' (real email_verified)"
      scope_name: email
      description: "Email address"
      expression: |
        return {
            "email": request.user.email,
            "email_verified": request.user.attributes.get("email_verified", False) is True,
        }
  - model: authentik_providers_oauth2.oauth2provider
    id: provider-beekeepingit
    identifiers: { name: beekeepingit-pwa }
    attrs:
      name: beekeepingit-pwa
      client_type: public
      client_id: beekeepingit-pwa
      authorization_flow:
        !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key:
        !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      sub_mode: user_upn
      issuer_mode: per_provider
      include_claims_in_id_token: true
      access_code_validity: minutes=1
      access_token_validity: minutes=15
      refresh_token_validity: days=30
      # Explicit grant types — required on Authentik 2026.5.x (defaults to [] = no grants,
      # which rejects the authorization_code flow). The PWA uses auth-code + PKCE + refresh.
      grant_types: [authorization_code, refresh_token]
      # {{ .Values.global.appOrigin }} is this environment's browser-facing app
      # origin (dev: app.beekeepingit.local:8443 via k3d's host-port mapping;
      # staging/prod: the real Ingress host, no port) — rendered via `tpl` in
      # templates/blueprint-configmap.yaml, not a plain file include.
      redirect_uris:
        - { matching_mode: regex, url: "http://localhost:.*" }
        - { matching_mode: regex, url: '{{ .Values.global.appOrigin | replace "." "\\." }}/.*' }
        # The PWA sends the bare origin (no path) as its redirect_uri, and Authentik derives
        # CORS-allowed origins from redirect_uris — an Origin has no path, so the regex above
        # (which requires "/…") never matches it. This strict entry covers redirect + CORS.
        - { matching_mode: strict, url: "{{ .Values.global.appOrigin }}" }
      property_mappings:
        - !Find [
            authentik_providers_oauth2.scopemapping,
            [managed, goauthentik.io/providers/oauth2/scope-openid],
          ]
        - !Find [
            authentik_providers_oauth2.scopemapping,
            [managed, goauthentik.io/providers/oauth2/scope-profile],
          ]
        # The custom mapping above, NOT the managed scope-email built-in — the
        # built-in's email_verified is a hardcoded constant (#361, NFR-SEC-1).
        - !KeyOf scope-email-verified
        - !Find [
            authentik_providers_oauth2.scopemapping,
            [managed, goauthentik.io/providers/oauth2/scope-offline_access],
          ]
  - model: authentik_core.application
    id: app-beekeepingit
    identifiers: { slug: beekeepingit }
    attrs: { name: BeekeepingIT, slug: beekeepingit, provider: !KeyOf provider-beekeepingit }

  # --- White-label the login as BeekeepingIT (not authentik) so end users never see the
  # IdP's branding. Applied live via the API during #193 login re-validation; recorded here
  # so a fresh deploy matches. ---
  - model: authentik_brands.brand
    identifiers: { domain: authentik-default }
    attrs:
      branding_title: BeekeepingIT
      # branding_logo only accepts a file path (not a data URI), so the authentik wordmark is
      # hidden and replaced by a text header in CSS; the "Powered by authentik" footer is
      # removed and the app's dark/amber theme applied.
      branding_custom_css: |
        .pf-c-brand img{display:none!important}
        .pf-c-brand::after{content:'BeekeepingIT';color:#E8B979;font-size:30px;font-weight:700;font-family:'Segoe UI',Roboto,sans-serif}
        .pf-c-login__footer{display:none!important}
        :root{--ak-global--background-image:none!important}
        .pf-c-background-image,.pf-c-background-image::before{background:#1a120b!important;background-image:none!important}
        .ak-static-page,body{background:#1a120b!important}
        .pf-c-button.pf-m-primary{background:#E8B979!important;border-color:#E8B979!important;color:#1a120b!important}
  # Flow header text: "Welcome to authentik!" -> "Sign in".
  - model: authentik_flows.flow
    identifiers: { slug: default-authentication-flow }
    attrs: { title: "Sign in" }

  # --- Email verification at login (#361, NFR-SEC-1, NFR-I18N-1) ---
  # Built when accounts were exclusively invite/admin-provisioned (registration
  # disabled), so verification couldn't ride an enrollment flow — it's injected
  # into the authentication flow instead: an unverified, non-superuser login is
  # gated on an email stage (one-time link, sent to the account's address), and a
  # user_write stage right after it stamps `attributes.email_verified: true` — the
  # exact attribute the custom scope mapping above emits. Binding orders 40/45 slot
  # between the default flow's mfa-validation (30) and user-login (100). Since
  # #366 (self-service registration section below) this same gate doubles as the
  # RECOVERY path for a registration abandoned before its emailed link was used:
  # the next login attempt re-sends a fresh link. Both flows reuse these stage
  # objects — keep them generic.
  #
  # i18n (NFR-I18N-1): the subject "Account Confirmation" is deliberately the
  # exact gettext msgid from Authentik's catalogs (pt_PT: "Confirmação de Conta")
  # so it stays translatable — a custom subject string would bypass translation
  # entirely. KNOWN LIMITATION, verified in the authentik source at the pinned
  # 2026.5.4: flow-triggered mail is translated per the REQUEST's negotiated
  # language, not the recipient's saved locale — stages/email/stage.py renders
  # with language=pending_user.locale(request), and core/models.py User.locale()
  # returns request.LANGUAGE_CODE whenever a request is present (the
  # attributes.settings.locale fallback only applies to non-request sends) — and
  # pt-PT can never negotiate: Django's default LANGUAGES has no pt-pt entry (so
  # an Accept-Language: pt-PT request activates plain "pt") while authentik ships
  # a pt_PT catalog but no "pt" one. Net effect: verification emails render in
  # English today regardless of user locale; the msgid subject keeps translation
  # engaged the moment an upstream fix (or a LANGUAGES override) lands. See
  # auth.md §8.10's limitation note.
  - model: authentik_stages_email.emailstage
    id: stage-email-verification
    identifiers: { name: beekeepingit-email-verification }
    attrs:
      name: beekeepingit-email-verification
      # Connection comes from the AUTHENTIK_EMAIL__* env (templates/config-secret.yaml)
      # — dev/CI: the Mailpit sink; staging/prod: a real relay whose credentials are
      # infra configuration, never in git (NFR-SEC-1).
      use_global_settings: true
      template: email/account_confirmation.html
      subject: Account Confirmation
      token_expiry: minutes=30
      # If an account was provisioned inactive, proving inbox control activates it.
      activate_user_on_success: true
  - model: authentik_stages_user_write.userwritestage
    id: stage-email-verification-write
    identifiers: { name: beekeepingit-email-verification-write }
    attrs:
      name: beekeepingit-email-verification-write
      user_creation_mode: never_create
  # Runs the email stage only for an unverified, non-superuser pending user.
  # Superuser bypass = operator-lockout guard: a broken SMTP path must never lock
  # akadmin out of the admin UI (superusers never log into the PWA, so their
  # cosmetically-false claim is irrelevant). On a policy ERROR the binding's
  # default failure_result (false) skips the stage — the login proceeds but the
  # claim stays false: fail-closed for the claim, fail-open only for the login.
  - model: authentik_policies_expression.expressionpolicy
    id: policy-needs-email-verification
    identifiers: { name: beekeepingit-needs-email-verification }
    attrs:
      expression: |
        flow_plan = request.context.get("flow_plan")
        if not flow_plan:
            return False
        user = flow_plan.context.get("pending_user")
        if not user or not user.pk or user.is_superuser:
            return False
        return user.attributes.get("email_verified", False) is not True
  # Marks the address verified — but ONLY when the plan carries the proof the
  # emailed one-time link was actually used: `is_restored` is the FlowToken the
  # executor restores the plan from when the link is opened, and the email stage
  # itself already denies a token/user mismatch. Without that evidence (e.g. the
  # email stage was skipped by an evaluation error) nothing is written — the
  # attribute can never be set by merely reaching this point in the flow.
  # Injecting via prompt_data is the documented user_write contract; no prompt
  # stage participates in this flow, so nothing user-supplied is merged. The
  # write is MERGED into any existing prompt_data (setdefault + key assignment),
  # never assigned over it — assignment would silently discard whatever a
  # future stage placed in the plan (review finding on #361).
  - model: authentik_policies_expression.expressionpolicy
    id: policy-mark-email-verified
    identifiers: { name: beekeepingit-mark-email-verified }
    attrs:
      expression: |
        flow_plan = request.context.get("flow_plan")
        if not flow_plan:
            return False
        user = flow_plan.context.get("pending_user")
        if not user or not user.pk or user.is_superuser:
            return False
        if user.attributes.get("email_verified", False) is True:
            return False
        restore_token = flow_plan.context.get("is_restored")
        if not restore_token or restore_token.user != user:
            return False
        prompt_data = flow_plan.context.setdefault("prompt_data", {})
        prompt_data["attributes.email_verified"] = True
        return True
  # evaluate_on_plan: false + re_evaluate_policies: true on both bindings: at plan
  # time (flow start) there is no pending_user yet — identification only sets it
  # mid-execution — so the policies must run at stage time (same flags as
  # Authentik's own conditional-stage examples).
  - model: authentik_flows.flowstagebinding
    id: binding-auth-email-verification
    identifiers:
      target: !Find [authentik_flows.flow, [slug, default-authentication-flow]]
      stage: !KeyOf stage-email-verification
      order: 40
    attrs:
      evaluate_on_plan: false
      re_evaluate_policies: true
  - model: authentik_flows.flowstagebinding
    id: binding-auth-email-verification-write
    identifiers:
      target: !Find [authentik_flows.flow, [slug, default-authentication-flow]]
      stage: !KeyOf stage-email-verification-write
      order: 45
    attrs:
      evaluate_on_plan: false
      re_evaluate_policies: true
  - model: authentik_policies.policybinding
    identifiers:
      policy: !KeyOf policy-needs-email-verification
      target: !KeyOf binding-auth-email-verification
      order: 0
  - model: authentik_policies.policybinding
    identifiers:
      policy: !KeyOf policy-mark-email-verified
      target: !KeyOf binding-auth-email-verification-write
      order: 0

  # --- Self-service email change is DISABLED (#361) — the #170 shape one layer down ---
  # A verified user re-pointing their OWN IdP email at a victim's pending
  # invitation while keeping email_verified=true is blocked one level EARLIER
  # than any reset-on-change policy could act: the default user-settings flow's
  # own validation policy (default-user-settings-authorization) rejects an email
  # change with "Not allowed to change email address." unless
  # Tenant.default_user_change_email is enabled — and on the pinned Authentik
  # 2026.5.4 that setting defaults to FALSE (authentik/tenants/models.py lines
  # 64–66). The e2e proves the rejection live (verification.spec.ts drives the
  # real flow executor and asserts the error), so a version bump that flips the
  # default goes red instead of silently opening the path.
  #
  # This file deliberately carries NO entry pinning that setting: the Tenant
  # model subclasses InternallyManagedMixin, which blueprints/v1/importer.py's
  # is_model_allowed EXCLUDES from blueprint management (verified at 2026.5.4),
  # the field does not exist on authentik_brands.brand, and no AUTHENTIK_* env
  # configures it — the version pin + the live e2e + the oidc-integration.md §8
  # watch-list ARE the pin.
  #
  # An earlier revision of this branch carried a "reset email_verified on email
  # change" expression policy on the user-settings flow's write binding
  # (upstream binding identifiers verified against
  # blueprints/default/flow-default-user-settings-flow.yaml @ version/2026.5.4
  # lines 144–148: order 100). It was removed as DEAD config: the prompt stage's
  # validation rejects any email change before the write stage could ever see a
  # different address, so the policy could never fire. If
  # default_user_change_email is EVER deliberately enabled, that reset policy
  # becomes mandatory again — recover it from git history (PR #411) and
  # re-verify the binding identifiers against the then-current version first.
  # Admin-driven email changes (admin API/UI) bypass the settings flow and do
  # NOT reset verification — an accepted operator-trust boundary (auth.md §8.10).

  # --- Self-service registration (#366, FR-ONB-1/2/3, FR-AU-1, NFR-SEC-1) ---
  # Username/email/password enrollment, config-as-code, surfaced as the login
  # page's "Need an account? Sign up." link (the identification-stage update at
  # the end of this section). The trust anchor is UNCHANGED from #361: no path
  # issues a session — and therefore no token the app or the invitation
  # accept-on-login gate would trust — before inbox control is proven via an
  # emailed one-time link.
  #
  # A fresh registration is created ACTIVE but UNVERIFIED — deliberately NOT
  # the upstream example's inactive-until-verified: an abandoned registration
  # (verification link lost or expired past its 30 minutes) self-heals through
  # the authentication flow's own email stage (order 40 above) on the next
  # login attempt, instead of dead-ending an account that can neither log in
  # (inactive) nor re-register (unique username) with no recovery flow built
  # yet (EPIC-14 #15). The security outcome is identical either way: this
  # flow's email stage (order 30 below) holds enrollment before user_login,
  # and a direct login attempt is held by the authentication flow's stage.
  #
  # Write-safety (the #170 shape at enrollment): the prompt stage's declared
  # field list IS the write boundary. The prompt serializer only admits
  # declared field_keys (verified at 2026.5.4, stages/prompt/stage.py — extra
  # JSON keys never reach prompt_data), and user_write additionally blocks
  # groups/pk writes and discards unknown keys (stages/user_write/stage.py).
  # No declared field is an `attributes.*` key, so a registrant cannot inject
  # `attributes.email_verified` (or any other attribute): the attribute is
  # only ever written by policy-mark-email-verified above, which demands the
  # restored-flow-token proof. The upn policy below also strips any
  # `attributes.email_verified` from prompt_data as defense in depth.
  #
  # Collisions (account-existence posture, #366 AC): `type: username` rejects
  # a duplicate username at the form — the existence signal this leaks is
  # Authentik's own default for that field type, accepted as-is. A duplicate
  # EMAIL is allowed (also the upstream default — no uniqueness policy is
  # added, so no NEW existence signal either): it creates a second, unrelated
  # account that can never produce a verified session without inbox control,
  # and no account linking/matching exists to merge it with the original
  # (that's #364) — registering with an existing account's address grants
  # nothing (e2e-pinned in client/e2e/tests/registration.spec.ts).
  #
  # i18n (NFR-I18N-1): prompt labels/placeholders and the flow title are DB
  # strings Authentik renders as-is (no gettext lookup), and the flow
  # executor's own UI strings ("Need an account? Sign up.", "Continue", ...)
  # translate only into the web catalogs Authentik ships — which at the
  # pinned 2026.5.4 include pt-BR but NOT pt-PT — so the registration screens
  # render in English for a pt-PT browser today: the same limitation class as
  # the verification email (auth.md §8.10/§8.11, #412; re-check on version
  # bumps). The verification email itself is the SAME stage object as
  # login-time verification (msgid subject — see its entry above).
  - model: authentik_flows.flow
    id: flow-enrollment
    identifiers: { slug: beekeepingit-enrollment }
    attrs:
      name: beekeepingit-enrollment
      # Untranslated DB string, like the authentication flow's "Sign in" above.
      title: Create your account
      designation: enrollment
      # An already-authenticated user has no business re-enrolling.
      authentication: require_unauthenticated
  - model: authentik_stages_prompt.prompt
    id: prompt-enrollment-username
    identifiers: { name: beekeepingit-enrollment-field-username }
    attrs:
      name: beekeepingit-enrollment-field-username
      field_key: username
      label: Username
      # `username` type = text + reject-duplicate-usernames (upstream default
      # behavior; see the collision note above).
      type: username
      required: true
      placeholder: Username
      placeholder_expression: false
      order: 0
  - model: authentik_stages_prompt.prompt
    id: prompt-enrollment-email
    identifiers: { name: beekeepingit-enrollment-field-email }
    attrs:
      name: beekeepingit-enrollment-field-email
      field_key: email
      label: Email
      type: email
      required: true
      placeholder: Email
      placeholder_expression: false
      order: 10
  - model: authentik_stages_prompt.prompt
    id: prompt-enrollment-password
    identifiers: { name: beekeepingit-enrollment-field-password }
    attrs:
      name: beekeepingit-enrollment-field-password
      field_key: password
      label: Password
      type: password
      required: true
      placeholder: Password
      placeholder_expression: false
      order: 20
  - model: authentik_stages_prompt.prompt
    id: prompt-enrollment-password-repeat
    identifiers: { name: beekeepingit-enrollment-field-password-repeat }
    attrs:
      name: beekeepingit-enrollment-field-password-repeat
      field_key: password_repeat
      label: Password (repeat)
      # Two `password`-type fields on one prompt stage triggers the stage's
      # built-in equality validation. user_write has no `password_repeat`
      # field/setter, so the value is discarded at write time — it never lands
      # in attributes (verified at 2026.5.4, stages/user_write/stage.py).
      type: password
      required: true
      placeholder: Password (repeat)
      placeholder_expression: false
      order: 30
  # Length-only static rule (no composition classes, per current NIST-style
  # guidance), deterministic and offline (HIBP/zxcvbn deliberately off: no
  # external calls, no probabilistic scoring in CI). Exact strength policy is
  # EPIC-14 (#15) security-review scope — this is the sane floor, not the
  # final word.
  - model: authentik_policies_password.passwordpolicy
    id: policy-enrollment-password
    identifiers: { name: beekeepingit-enrollment-password }
    attrs:
      name: beekeepingit-enrollment-password
      password_field: password
      check_static_rules: true
      length_min: 12
      error_message: Password must be at least 12 characters long.
  - model: authentik_stages_prompt.promptstage
    id: stage-enrollment-prompt
    identifiers: { name: beekeepingit-enrollment-prompt }
    attrs:
      name: beekeepingit-enrollment-prompt
      fields:
        - !KeyOf prompt-enrollment-username
        - !KeyOf prompt-enrollment-email
        - !KeyOf prompt-enrollment-password
        - !KeyOf prompt-enrollment-password-repeat
      validation_policies:
        - !KeyOf policy-enrollment-password
  - model: authentik_stages_user_write.userwritestage
    id: stage-enrollment-user-write
    identifiers: { name: beekeepingit-enrollment-user-write }
    attrs:
      name: beekeepingit-enrollment-user-write
      user_creation_mode: always_create
      # Active-but-unverified, NOT the upstream example's inactive-until-
      # verified — see the section comment for why (login-time self-healing;
      # the session gate is the email stages, not is_active).
      create_users_as_inactive: false
  # Assigns the app-facing subject at creation: sub_mode=user_upn (provider
  # above) reads `attributes.upn`, and oidc-integration.md §4 requires every
  # self-service enrollment to assign a UUID upn per user (this policy closes
  # that forward-requirement; the seed users' pinned upns above are the
  # dev/CI analogue). Without it Authentik would silently fall back to
  # user.uuid — functional, but an admin later setting a upn would CHANGE the
  # user's sub and orphan their app identity. setdefault keeps any re-run
  # idempotent; the pop strips a hypothetical email_verified injection as
  # defense in depth (the prompt field list already makes it unreachable).
  # On a policy ERROR the binding's default failure_result (false) SKIPS
  # user_write: no user is created and enrollment fails — fail closed, never
  # a upn-less account.
  - model: authentik_policies_expression.expressionpolicy
    id: policy-enrollment-assign-upn
    identifiers: { name: beekeepingit-enrollment-assign-upn }
    attrs:
      expression: |
        from uuid import uuid4
        flow_plan = request.context.get("flow_plan")
        if not flow_plan:
            return False
        prompt_data = flow_plan.context.setdefault("prompt_data", {})
        prompt_data.pop("attributes.email_verified", None)
        prompt_data.setdefault("attributes.upn", str(uuid4()))
        return True
  # Stage order: prompt (10) → user_write/create (20, upn policy) → email
  # verification (30, REUSED stage from #361 — safe to share across flows:
  # at 2026.5.4 each send mints a FlowToken whose identifier embeds a fresh
  # uuid4, so enrollment and login-time verification links never collide) →
  # user_write/stamp (40, REUSED stage+policy — only writes
  # `attributes.email_verified: true` on restored-flow-token proof, exactly
  # as at login) → user_login (100, REUSED default stage so session behavior
  # matches a normal login). The email stage at 30 is deliberately
  # UNCONDITIONAL (no needs-verification policy): a fresh registration is
  # unverified by definition, and if the stage were ever skipped by an
  # evaluation error the account would simply stay unverified and be held at
  # the authentication flow's own gate — fail closed either way.
  - model: authentik_flows.flowstagebinding
    id: binding-enrollment-prompt
    identifiers:
      target: !KeyOf flow-enrollment
      stage: !KeyOf stage-enrollment-prompt
      order: 10
  - model: authentik_flows.flowstagebinding
    id: binding-enrollment-user-write
    identifiers:
      target: !KeyOf flow-enrollment
      stage: !KeyOf stage-enrollment-user-write
      order: 20
    attrs:
      # Stage-time evaluation (same flags/rationale as the #361 bindings
      # above): at plan time prompt_data doesn't exist yet, so the upn policy
      # must run when the stage is reached.
      evaluate_on_plan: false
      re_evaluate_policies: true
  - model: authentik_flows.flowstagebinding
    id: binding-enrollment-email
    identifiers:
      target: !KeyOf flow-enrollment
      stage: !KeyOf stage-email-verification
      order: 30
  - model: authentik_flows.flowstagebinding
    id: binding-enrollment-email-write
    identifiers:
      target: !KeyOf flow-enrollment
      stage: !KeyOf stage-email-verification-write
      order: 40
    attrs:
      evaluate_on_plan: false
      re_evaluate_policies: true
  - model: authentik_policies.policybinding
    identifiers:
      policy: !KeyOf policy-enrollment-assign-upn
      target: !KeyOf binding-enrollment-user-write
      order: 0
  - model: authentik_policies.policybinding
    identifiers:
      policy: !KeyOf policy-mark-email-verified
      target: !KeyOf binding-enrollment-email-write
      order: 0
  - model: authentik_flows.flowstagebinding
    id: binding-enrollment-user-login
    identifiers:
      target: !KeyOf flow-enrollment
      stage:
        !Find [authentik_stages_user_login.userloginstage, [name, default-authentication-login]]
      order: 100
  # Surfaces the flow: the identification stage renders "Need an account?
  # Sign up." (inside the login card's pf-c-login__main-footer-band — NOT the
  # pf-c-login__footer the brand CSS above hides), and at 2026.5.4 the link
  # preserves the executor's stored ?next query (reverse_with_qs on
  # SESSION_KEY_GET) — so a user who arrived via the app's OIDC authorize
  # redirect flows register → emailed link → auto-login → straight back into
  # the pending authorize request and lands in the app, no dead end at the
  # IdP. `user_fields` MUST be restated here even though this entry only
  # means to add enrollment_flow: the importer validates an update entry's
  # own data, and IdentificationStageSerializer's cross-field validation
  # rejects "no user fields and no source" — omitting it marks the WHOLE
  # blueprint invalid and nothing in this file applies (found live: the CI
  # bring-up's discovery 404, PR #414). The value pins upstream's default
  # ([email, username], flow-default-authentication-flow.yaml @ 2026.5.4) —
  # re-check on version bumps (oidc-integration.md §8 watch-list).
  - model: authentik_stages_identification.identificationstage
    identifiers: { name: default-authentication-identification }
    attrs:
      user_fields: [email, username]
      enrollment_flow: !KeyOf flow-enrollment
