version: 1
metadata:
  name: beekeepingit
  labels: { blueprints.goauthentik.io/instantiate: "true" }
entries:
  - model: authentik_core.group
    id: group-platform-operator
    identifiers: { name: platform-operator }
    attrs: { name: platform-operator }
  - model: authentik_core.user
    id: user-test-beekeeper
    identifiers: { username: test.beekeeper@beekeepingit.local }
    attrs:
      username: test.beekeeper@beekeepingit.local
      name: Test Beekeeper
      email: test.beekeeper@beekeepingit.local
      is_active: true
      path: users
      # upn: sub_mode=user_upn => sub = this UUID (devseed pins it).
      # email_verified: seeded VERIFIED (#361) — this is a dev/CI-provisioned trusted
      # account (the address isn't a real inbox), and the walking-skeleton e2e's login
      # must not detour through the verification email stage below. Seeding the
      # attribute is also the documented escape hatch for ops-provisioned accounts
      # whose address was verified out-of-band.
      attributes: { upn: "11111111-1111-4111-8111-111111111111", email_verified: true }
      groups: [!KeyOf group-platform-operator]
      password: dev-password123
  # Second dev/CI seed user, deliberately UNVERIFIED (#361): the verification-flow
  # e2e (client/e2e/tests/verification.spec.ts) logs in as this user, expects the
  # email stage to gate the login, completes it via the Mailpit-captured link, and
  # asserts the id_token then carries email_verified=true. No group, no org
  # membership (devseed doesn't know it) — after verifying it lands on onboarding.
  - model: authentik_core.user
    id: user-unverified-beekeeper
    identifiers: { username: unverified.beekeeper@beekeepingit.local }
    attrs:
      username: unverified.beekeeper@beekeepingit.local
      name: Unverified Beekeeper
      email: unverified.beekeeper@beekeepingit.local
      is_active: true
      path: users
      attributes: { upn: "22222222-2222-4222-8222-222222222222" }
      password: dev-password123
  # Custom `email` scope mapping (#361, NFR-SEC-1): emits the user's GENUINE
  # verification state instead of the built-in managed mapping's hardcoded value.
  # Note the built-in hardcodes `email_verified: False` on the pinned 2026.5.4
  # (changed from `True` in Authentik 2025.10) — either constant is cosmetic; this
  # mapping reads the `email_verified` user attribute that the verification flow
  # below sets on completion. The strict `is True` check fails closed on any
  # non-boolean junk an attribute could hold.
  - model: authentik_providers_oauth2.scopemapping
    id: scope-email-verified
    identifiers: { name: "BeekeepingIT OAuth Mapping: OpenID 'email' (real email_verified)" }
    attrs:
      name: "BeekeepingIT OAuth Mapping: OpenID 'email' (real email_verified)"
      scope_name: email
      description: "Email address"
      expression: |
        return {
            "email": request.user.email,
            "email_verified": request.user.attributes.get("email_verified", False) is True,
        }
  - model: authentik_providers_oauth2.oauth2provider
    id: provider-beekeepingit
    identifiers: { name: beekeepingit-pwa }
    attrs:
      name: beekeepingit-pwa
      client_type: public
      client_id: beekeepingit-pwa
      authorization_flow:
        !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key:
        !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      sub_mode: user_upn
      issuer_mode: per_provider
      include_claims_in_id_token: true
      access_code_validity: minutes=1
      access_token_validity: minutes=15
      refresh_token_validity: days=30
      # Explicit grant types — required on Authentik 2026.5.x (defaults to [] = no grants,
      # which rejects the authorization_code flow). The PWA uses auth-code + PKCE + refresh.
      grant_types: [authorization_code, refresh_token]
      # {{ .Values.global.appOrigin }} is this environment's browser-facing app
      # origin (dev: app.beekeepingit.local:8443 via k3d's host-port mapping;
      # staging/prod: the real Ingress host, no port) — rendered via `tpl` in
      # templates/blueprint-configmap.yaml, not a plain file include.
      redirect_uris:
        - { matching_mode: regex, url: "http://localhost:.*" }
        - { matching_mode: regex, url: '{{ .Values.global.appOrigin | replace "." "\\." }}/.*' }
        # The PWA sends the bare origin (no path) as its redirect_uri, and Authentik derives
        # CORS-allowed origins from redirect_uris — an Origin has no path, so the regex above
        # (which requires "/…") never matches it. This strict entry covers redirect + CORS.
        - { matching_mode: strict, url: "{{ .Values.global.appOrigin }}" }
      property_mappings:
        - !Find [
            authentik_providers_oauth2.scopemapping,
            [managed, goauthentik.io/providers/oauth2/scope-openid],
          ]
        - !Find [
            authentik_providers_oauth2.scopemapping,
            [managed, goauthentik.io/providers/oauth2/scope-profile],
          ]
        # The custom mapping above, NOT the managed scope-email built-in — the
        # built-in's email_verified is a hardcoded constant (#361, NFR-SEC-1).
        - !KeyOf scope-email-verified
        - !Find [
            authentik_providers_oauth2.scopemapping,
            [managed, goauthentik.io/providers/oauth2/scope-offline_access],
          ]
  - model: authentik_core.application
    id: app-beekeepingit
    identifiers: { slug: beekeepingit }
    attrs: { name: BeekeepingIT, slug: beekeepingit, provider: !KeyOf provider-beekeepingit }

  # --- White-label the login as BeekeepingIT (not authentik) so end users never see the
  # IdP's branding. Applied live via the API during #193 login re-validation; recorded here
  # so a fresh deploy matches. ---
  - model: authentik_brands.brand
    identifiers: { domain: authentik-default }
    attrs:
      branding_title: BeekeepingIT
      # branding_logo only accepts a file path (not a data URI), so the authentik wordmark is
      # hidden and replaced by a text header in CSS; the "Powered by authentik" footer is
      # removed and the app's dark/amber theme applied.
      branding_custom_css: |
        .pf-c-brand img{display:none!important}
        .pf-c-brand::after{content:'BeekeepingIT';color:#E8B979;font-size:30px;font-weight:700;font-family:'Segoe UI',Roboto,sans-serif}
        .pf-c-login__footer{display:none!important}
        :root{--ak-global--background-image:none!important}
        .pf-c-background-image,.pf-c-background-image::before{background:#1a120b!important;background-image:none!important}
        .ak-static-page,body{background:#1a120b!important}
        .pf-c-button.pf-m-primary{background:#E8B979!important;border-color:#E8B979!important;color:#1a120b!important}
  # Flow header text: "Welcome to authentik!" -> "Sign in".
  - model: authentik_flows.flow
    identifiers: { slug: default-authentication-flow }
    attrs: { title: "Sign in" }

  # --- Email verification at login (#361, NFR-SEC-1, NFR-I18N-1) ---
  # Existing accounts are invite/admin-provisioned (registration disabled), so
  # verification can't ride an enrollment flow — it's injected into the
  # authentication flow instead: an unverified, non-superuser login is gated on an
  # email stage (one-time link, sent to the account's address), and a user_write
  # stage right after it stamps `attributes.email_verified: true` — the exact
  # attribute the custom scope mapping above emits. Binding orders 40/45 slot
  # between the default flow's mfa-validation (30) and user-login (100).
  #
  # i18n (NFR-I18N-1): the built-in account-confirmation template is rendered in
  # the pending user's locale (Authentik ships full pt_PT + en catalogs for it),
  # and the subject "Account Confirmation" is deliberately the exact gettext msgid
  # from that catalog so it localizes too ("Confirmação de Conta") — a custom
  # subject string would bypass translation. Locale source: the user's
  # attributes.settings.locale, falling back to the request's Accept-Language.
  - model: authentik_stages_email.emailstage
    id: stage-email-verification
    identifiers: { name: beekeepingit-email-verification }
    attrs:
      name: beekeepingit-email-verification
      # Connection comes from the AUTHENTIK_EMAIL__* env (templates/config-secret.yaml)
      # — dev/CI: the Mailpit sink; staging/prod: a real relay whose credentials are
      # infra configuration, never in git (NFR-SEC-1).
      use_global_settings: true
      template: email/account_confirmation.html
      subject: Account Confirmation
      token_expiry: minutes=30
      # If an account was provisioned inactive, proving inbox control activates it.
      activate_user_on_success: true
  - model: authentik_stages_user_write.userwritestage
    id: stage-email-verification-write
    identifiers: { name: beekeepingit-email-verification-write }
    attrs:
      name: beekeepingit-email-verification-write
      user_creation_mode: never_create
  # Runs the email stage only for an unverified, non-superuser pending user.
  # Superuser bypass = operator-lockout guard: a broken SMTP path must never lock
  # akadmin out of the admin UI (superusers never log into the PWA, so their
  # cosmetically-false claim is irrelevant). On a policy ERROR the binding's
  # default failure_result (false) skips the stage — the login proceeds but the
  # claim stays false: fail-closed for the claim, fail-open only for the login.
  - model: authentik_policies_expression.expressionpolicy
    id: policy-needs-email-verification
    identifiers: { name: beekeepingit-needs-email-verification }
    attrs:
      expression: |
        flow_plan = request.context.get("flow_plan")
        if not flow_plan:
            return False
        user = flow_plan.context.get("pending_user")
        if not user or not user.pk or user.is_superuser:
            return False
        return user.attributes.get("email_verified", False) is not True
  # Marks the address verified — but ONLY when the plan carries the proof the
  # emailed one-time link was actually used: `is_restored` is the FlowToken the
  # executor restores the plan from when the link is opened, and the email stage
  # itself already denies a token/user mismatch. Without that evidence (e.g. the
  # email stage was skipped by an evaluation error) nothing is written — the
  # attribute can never be set by merely reaching this point in the flow.
  # Injecting via prompt_data is the documented user_write contract; no prompt
  # stage participates in this flow, so nothing user-supplied is merged.
  - model: authentik_policies_expression.expressionpolicy
    id: policy-mark-email-verified
    identifiers: { name: beekeepingit-mark-email-verified }
    attrs:
      expression: |
        flow_plan = request.context.get("flow_plan")
        if not flow_plan:
            return False
        user = flow_plan.context.get("pending_user")
        if not user or not user.pk or user.is_superuser:
            return False
        if user.attributes.get("email_verified", False) is True:
            return False
        restore_token = flow_plan.context.get("is_restored")
        if not restore_token or restore_token.user != user:
            return False
        flow_plan.context["prompt_data"] = {"attributes.email_verified": True}
        return True
  # evaluate_on_plan: false + re_evaluate_policies: true on both bindings: at plan
  # time (flow start) there is no pending_user yet — identification only sets it
  # mid-execution — so the policies must run at stage time (same flags as
  # Authentik's own conditional-stage examples).
  - model: authentik_flows.flowstagebinding
    id: binding-auth-email-verification
    identifiers:
      target: !Find [authentik_flows.flow, [slug, default-authentication-flow]]
      stage: !KeyOf stage-email-verification
      order: 40
    attrs:
      evaluate_on_plan: false
      re_evaluate_policies: true
  - model: authentik_flows.flowstagebinding
    id: binding-auth-email-verification-write
    identifiers:
      target: !Find [authentik_flows.flow, [slug, default-authentication-flow]]
      stage: !KeyOf stage-email-verification-write
      order: 45
    attrs:
      evaluate_on_plan: false
      re_evaluate_policies: true
  - model: authentik_policies.policybinding
    identifiers:
      policy: !KeyOf policy-needs-email-verification
      target: !KeyOf binding-auth-email-verification
      order: 0
  - model: authentik_policies.policybinding
    identifiers:
      policy: !KeyOf policy-mark-email-verified
      target: !KeyOf binding-auth-email-verification-write
      order: 0

  # --- Email change resets verification (#361) ---
  # Authentik's default user-settings flow lets a user edit their own email
  # (brand default_user_change_email). Left alone, a verified attacker could
  # verify their OWN address once, then self-change their IdP email to a victim's
  # and keep email_verified=true — the same unauthorized-org-join shape #170
  # closed for the profile email, reopened one layer down. This policy rides the
  # default flow's own user_write binding (redeclared below to re-evaluate at
  # stage time) and forces `email_verified: false` into the write whenever the
  # submitted email differs from the current one — the next login then re-runs
  # the verification stage for the new address. On a policy ERROR the write is
  # skipped entirely (nothing changes — fail closed).
  - model: authentik_policies_expression.expressionpolicy
    id: policy-email-change-resets-verification
    identifiers: { name: beekeepingit-email-change-resets-verification }
    attrs:
      expression: |
        flow_plan = request.context.get("flow_plan")
        if not flow_plan:
            return True
        prompt_data = flow_plan.context.get("prompt_data")
        if not isinstance(prompt_data, dict):
            return True
        user = flow_plan.context.get("pending_user") or request.user
        new_email = prompt_data.get("email")
        if new_email is not None and new_email != user.email:
            prompt_data["attributes.email_verified"] = False
        return True
  # The default user-settings flow's own user_write binding (identifiers match the
  # upstream default blueprint's), redeclared to attach the policy above and to
  # evaluate it at stage time — prompt_data doesn't exist at plan time.
  - model: authentik_flows.flowstagebinding
    id: binding-user-settings-write
    identifiers:
      target: !Find [authentik_flows.flow, [slug, default-user-settings-flow]]
      stage: !Find [authentik_stages_user_write.userwritestage, [name, default-user-settings-write]]
      order: 100
    attrs:
      evaluate_on_plan: false
      re_evaluate_policies: true
  - model: authentik_policies.policybinding
    identifiers:
      policy: !KeyOf policy-email-change-resets-verification
      target: !KeyOf binding-user-settings-write
      order: 0
