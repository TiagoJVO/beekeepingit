{{/*
`beekeepingit-authentik-config` — the Secret the Authentik server/worker read via
`authentik.existingSecret.secretName` (set on the Flux HelmRelease). Carries the
server secret key, the bootstrap admin identity (seeded on first boot), and the
bundled-Postgres connection (host/name/user/password/port as AUTHENTIK_POSTGRESQL__*
env keys). Values are generated/persisted by the shared helper (see _helpers.tpl).
The Postgres host is the Service the bundled chart creates under the pinned
`releaseName: authentik` → `authentik-postgresql`.
*/}}
{{- if .Values.enabled }}
{{- include "authentik.secrets" . }}
{{- $gen := .Values.__authentikGenerated }}
apiVersion: v1
kind: Secret
metadata:
  name: beekeepingit-authentik-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "beekeepingit.labels" . | nindent 4 }}
    app.kubernetes.io/name: authentik
type: Opaque
stringData:
  AUTHENTIK_SECRET_KEY: {{ $gen.secretKey | quote }}
  AUTHENTIK_BOOTSTRAP_PASSWORD: {{ $gen.bootstrapPassword | quote }}
  AUTHENTIK_BOOTSTRAP_TOKEN: {{ $gen.bootstrapToken | quote }}
  AUTHENTIK_BOOTSTRAP_EMAIL: {{ .Values.bootstrapEmail | quote }}
  AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
  AUTHENTIK_POSTGRESQL__NAME: authentik
  AUTHENTIK_POSTGRESQL__USER: authentik
  AUTHENTIK_POSTGRESQL__PASSWORD: {{ $gen.pgPassword | quote }}
  AUTHENTIK_POSTGRESQL__PORT: "5432"
{{- end }}
