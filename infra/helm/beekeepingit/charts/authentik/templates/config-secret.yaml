{{/*
`beekeepingit-authentik-config` — the Secret the Authentik server/worker read via
`authentik.existingSecret.secretName` (set on the Flux HelmRelease). Carries the
server secret key, the bootstrap admin identity (seeded on first boot), and the
bundled-Postgres connection (host/name/user/password/port as AUTHENTIK_POSTGRESQL__*
env keys). Values are generated/persisted by the shared helper (see _helpers.tpl).
The Postgres host is the Service the bundled chart creates under the pinned
`releaseName: authentik` → `authentik-postgresql`.
*/}}
{{- if .Values.enabled }}
{{- include "authentik.secrets" . }}
{{- $gen := .Values.__authentikGenerated }}
apiVersion: v1
kind: Secret
metadata:
  name: beekeepingit-authentik-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "beekeepingit.labels" . | nindent 4 }}
    app.kubernetes.io/name: authentik
type: Opaque
stringData:
  AUTHENTIK_SECRET_KEY: {{ $gen.secretKey | quote }}
  AUTHENTIK_BOOTSTRAP_PASSWORD: {{ $gen.bootstrapPassword | quote }}
  AUTHENTIK_BOOTSTRAP_TOKEN: {{ $gen.bootstrapToken | quote }}
  AUTHENTIK_BOOTSTRAP_EMAIL: {{ .Values.bootstrapEmail | quote }}
  AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
  AUTHENTIK_POSTGRESQL__NAME: authentik
  AUTHENTIK_POSTGRESQL__USER: authentik
  AUTHENTIK_POSTGRESQL__PASSWORD: {{ $gen.pgPassword | quote }}
  AUTHENTIK_POSTGRESQL__PORT: "5432"
  {{- /*
  Outbound email (SMTP), #361 (NFR-SEC-1). The upstream chart mounts EVERY key of
  this Secret as env on both the server and the worker (envFrom.secretRef via
  authentik.existingSecret), so adding AUTHENTIK_EMAIL__* here wires Authentik's
  global email connection with zero changes to the external HelmRelease.
  Non-secret connection values come from values.yaml (per-environment
  overridable; dev/CI point at the Mailpit sink subchart). Username/password are
  deliberately NOT values (no secrets in git): when a real relay needs
  authentication, ops create the out-of-band Secret
  `beekeepingit-authentik-email-credentials` (keys: username, password) in the
  target namespace, and the next render merges it in via `lookup` — same
  cluster-state-not-git idiom as the generated credentials above. Mailpit needs
  no auth, so dev/CI simply never create that Secret.
  */}}
  {{- with .Values.email }}
  AUTHENTIK_EMAIL__HOST: {{ .host | quote }}
  AUTHENTIK_EMAIL__PORT: {{ .port | quote }}
  AUTHENTIK_EMAIL__FROM: {{ .from | quote }}
  AUTHENTIK_EMAIL__USE_TLS: {{ .useTls | quote }}
  AUTHENTIK_EMAIL__USE_SSL: {{ .useSsl | quote }}
  AUTHENTIK_EMAIL__TIMEOUT: {{ .timeout | quote }}
  {{- end }}
  {{- $emailCreds := lookup "v1" "Secret" .Values.global.namespace "beekeepingit-authentik-email-credentials" }}
  {{- if $emailCreds }}
  AUTHENTIK_EMAIL__USERNAME: {{ index $emailCreds.data "username" | b64dec | quote }}
  AUTHENTIK_EMAIL__PASSWORD: {{ index $emailCreds.data "password" | b64dec | quote }}
  {{- end }}
{{- end }}
