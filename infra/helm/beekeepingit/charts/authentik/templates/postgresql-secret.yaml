{{/*
`beekeepingit-authentik-postgresql` — the Secret the bundled Postgres reads via its
`auth.existingSecret` (set on the Flux HelmRelease's `postgresql.auth.existingSecret`).
Its `password` MUST equal the config Secret's `AUTHENTIK_POSTGRESQL__PASSWORD` so the
server/worker can authenticate; both come from the same memoized helper value
(see _helpers.tpl). Bitnami's postgresql chart uses the key `password` for the custom
(`auth.username`) user's password.
*/}}
{{- if .Values.enabled }}
{{- include "authentik.secrets" . }}
{{- $gen := .Values.__authentikGenerated }}
apiVersion: v1
kind: Secret
metadata:
  name: beekeepingit-authentik-postgresql
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "beekeepingit.labels" . | nindent 4 }}
    app.kubernetes.io/name: authentik
type: Opaque
stringData:
  password: {{ $gen.pgPassword | quote }}
{{- end }}
