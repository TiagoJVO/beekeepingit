{{/*
Generated MinIO root credentials (never a literal value in git — NFR-SEC), via
the standard Helm `lookup` (preserve existing value on `helm upgrade`) +
`randAlphaNum` (generate on first install) idiom — same as the authentik/postgres
subcharts. Named as a fixed literal (not release-prefixed): values.yaml is plain
data, not templated, so `minio.existingSecret` (which references this Secret's
name) can't embed `.Release.Name` — fine since one release per namespace/env.
*/}}
{{- if .Values.enabled }}
{{- $secretName := "root-credentials" }}
{{- $existing := lookup "v1" "Secret" .Values.global.namespace $secretName }}
{{- $rootUser := "" }}
{{- $rootPassword := "" }}
{{- if $existing }}
{{- $rootUser = index $existing.data "rootUser" | b64dec }}
{{- $rootPassword = index $existing.data "rootPassword" | b64dec }}
{{- else }}
{{- $rootUser = "beekeepingit-admin" }}
{{- $rootPassword = randAlphaNum 32 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "beekeepingit.labels" . | nindent 4 }}
    app.kubernetes.io/name: minio
type: Opaque
stringData:
  rootUser: {{ $rootUser | quote }}
  rootPassword: {{ $rootPassword | quote }}
{{- end }}
