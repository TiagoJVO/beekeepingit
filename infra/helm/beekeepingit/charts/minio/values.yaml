# Defaults for standalone `helm template`/`helm lint` of this subchart in
# isolation. When installed as part of the umbrella, these are overridden by the
# `minio:` key in the parent's values.yaml/environments/*.yaml.
#
# This chart only creates the supplementary root-credentials Secret — MinIO
# itself is a separate Flux `HelmRelease`
# (the beekeepingit-gitops repo's apps/dev/minio-helmrelease.yaml) that references it by name.
# See ADR-0012.
enabled: true

# Placeholder for standalone rendering only — the umbrella always injects the
# real global.* via its own values.yaml.
global:
  namespace: beekeepingit
