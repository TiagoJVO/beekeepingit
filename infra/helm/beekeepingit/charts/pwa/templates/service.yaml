{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: pwa
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "beekeepingit.labels" . | nindent 4 }}
    app.kubernetes.io/name: pwa
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: pwa
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
{{- end }}
