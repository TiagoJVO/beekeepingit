{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pwa
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "beekeepingit.labels" . | nindent 4 }}
    app.kubernetes.io/name: pwa
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pwa
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pwa
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      # Hardened pod/container security context (EPIC-14 #89, NFR-SEC-1,
      # trivy-config KSV-0014/KSV-0118). The image is `nginxinc/
      # nginx-unprivileged` (client/Dockerfile): runs as the fixed non-root
      # `nginx` user (uid/gid 101), binds :8080, and puts its pidfile in
      # /tmp. A read-only root filesystem needs writable paths for the two
      # dirs nginx writes at runtime — its proxy/temp cache under
      # /var/cache/nginx and the pidfile in /tmp — mounted here as emptyDirs.
      # `fsGroup: 101` makes those mounts writable to the nginx user (kubelet
      # chowns every mounted volume's group to it on pod start; a fresh
      # emptyDir is otherwise root-owned).
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
      containers:
        - name: pwa
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.port }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-tmp
              mountPath: /tmp
          livenessProbe:
            httpGet: { path: /, port: {{ .Values.port }} }
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /, port: {{ .Values.port }} }
            periodSeconds: 5
          resources:
            {{- index .Values.global.resources .Values.resourceTier | toYaml | nindent 12 }}
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-tmp
          emptyDir: {}
{{- end }}
