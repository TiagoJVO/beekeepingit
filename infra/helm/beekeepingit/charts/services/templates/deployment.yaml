{{- if .Values.enabled }}
{{- $root := . }}
{{- range $name, $svc := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $root.Values.global.namespace }}
  labels:
    {{- include "beekeepingit.labels" $root | nindent 4 }}
    app.kubernetes.io/name: {{ $name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
      app.kubernetes.io/instance: {{ $root.Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name }}
        app.kubernetes.io/instance: {{ $root.Release.Name }}
    spec:
      # Hardened pod/container security context (EPIC-14 #89, NFR-SEC-1,
      # trivy-config KSV-0014/KSV-0118). Safe for every service here: each
      # ships as a statically-linked Go binary on distroless:nonroot
      # (services/<name>/Dockerfile already sets USER nonroot:nonroot) that
      # never writes to disk (no os.WriteFile/os.Create/temp-dir usage in this
      # tree) — a read-only root filesystem changes no runtime behavior.
      securityContext:
        runAsNonRoot: true
      containers:
        - name: {{ $name }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          # Per-service `tag` overrides the shared `image.tag` when set — so Flux
          # image-automation can bump each service independently (they publish on
          # their own path-filtered CI legs). Defaults to the shared tag (`latest`
          # locally), so the manual dev deploy is unaffected. See #23 / #88.
          image: "{{ $root.Values.image.registry }}/{{ $svc.component }}:{{ $svc.tag | default $root.Values.image.tag }}"
          imagePullPolicy: {{ $root.Values.image.pullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
          env:
            - name: SERVICE_NAME
              value: {{ $name | quote }}
            - name: HTTP_ADDR
              value: ":{{ $svc.port }}"
            - name: LOG_LEVEL
              value: {{ $root.Values.logLevel | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ $root.Values.otelEndpoint | quote }}
            - name: OIDC_ISSUER_URL
              value: {{ $root.Values.oidc.issuerUrl | quote }}
            - name: OIDC_AUDIENCE
              value: {{ $root.Values.oidc.audience | quote }}
            {{- if $root.Values.oidc.discoveryUrl }}
            - name: OIDC_DISCOVERY_URL
              value: {{ $root.Values.oidc.discoveryUrl | quote }}
            {{- end }}
            {{- if $svc.db.enabled }}
            - name: DB_HOST
              value: {{ $root.Values.db.host | quote }}
            - name: DB_PORT
              value: {{ $root.Values.db.port | quote }}
            - name: DB_NAME
              value: {{ $root.Values.db.name | quote }}
            - name: DB_SSLMODE
              value: {{ $root.Values.db.sslmode | quote }}
            - name: DB_SEARCH_PATH
              value: {{ $svc.db.schema | quote }}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $svc.db.secret }}
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $svc.db.secret }}
                  key: password
            {{- end }}
            {{- if $svc.seedDevData }}
            - name: SEED_DEV_DATA
              value: "true"
            {{- end }}
            {{- range $k, $v := $svc.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          startupProbe:
            httpGet: { path: /readyz, port: {{ $svc.port }} }
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet: { path: /healthz, port: {{ $svc.port }} }
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /readyz, port: {{ $svc.port }} }
            periodSeconds: 5
          resources:
            {{- index $root.Values.global.resources $root.Values.resourceTier | toYaml | nindent 12 }}
{{- end }}
{{- end }}
