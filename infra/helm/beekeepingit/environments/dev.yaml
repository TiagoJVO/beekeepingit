# Local single-cluster dev overlay (the only environment actually deployed today).
global:
  environment: dev
  namespace: beekeepingit-dev

services:
  oidc:
    # The k3d-local aligned issuer (#23): the same host:port resolves both from
    # the browser (k3d maps host :8080 → Traefik) and in-cluster (CoreDNS +
    # the keycloak-oidc alias Service), and Keycloak's KC_HOSTNAME pins tokens
    # to it — so a browser-issued token's `iss` matches what services discover.
    issuerUrl: http://keycloak.beekeepingit.local:8080/realms/beekeepingit
