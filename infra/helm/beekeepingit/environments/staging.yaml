# Staging overlay — deployed on Scaleway Kapsule (D-26); mirrors the `values:`
# block of infra/gitops/apps/staging/beekeepingit-helmrelease.yaml (the
# actual Flux-managed source of truth) so this file stays useful for manual
# pre-merge `helm install -f environments/staging.yaml` testing instead of
# drifting into a stale placeholder — keep the two in sync by hand when
# either changes; see that HelmRelease's own comments for the full
# rationale behind each value below (nip.io hostnames, split OIDC
# issuer/discovery, the networkpolicy.gatewayNamespace fix, the one-off
# manually-built PWA image).
global:
  environment: staging
  namespace: beekeepingit-staging
  # No resources override here — staging currently runs the umbrella's base
  # small/medium/large defaults (values.yaml) unchanged; DEV1-L (D-26) has
  # enough headroom that this hasn't needed tuning yet.
  appOrigin: https://app.51-159-204-90.nip.io

gateway:
  appHost: app.51-159-204-90.nip.io
  authHost: auth.51-159-204-90.nip.io
  certManager:
    enabled: true
    clusterIssuer: letsencrypt-prod

services:
  oidc:
    issuerUrl: https://auth.51-159-204-90.nip.io/application/o/beekeepingit/
    discoveryUrl: http://authentik-server/application/o/beekeepingit/
    audience: beekeepingit-pwa
  # All 7 services the `services` subchart renders (charts/services/values.yaml)
  # — activities/journeys/todos are real deployed workloads, not just
  # reserved Postgres schemas. `ai` has no service yet, hence its absence.
  # Image-automation ($imagepolicy setter markers, mirroring apps/dev/) is
  # explicitly deferred — staging starts on `latest` until the Flux Git-write
  # credential is provisioned and per-service ImagePolicy objects exist.
  services:
    identity:
      tag: latest
    organizations:
      tag: latest
    apiaries:
      tag: latest
    activities:
      tag: latest
    journeys:
      tag: latest
    todos:
      tag: latest
    sync:
      tag: latest

pwa:
  image:
    # One-off manual build, not CI (compiled with the nip.io URLs above via
    # --dart-define — AppConfig reads these at Dart *compile* time, so `latest`
    # would have dev's *.beekeepingit.local:8443 baked in and fail to log in).
    # See FOLLOWUPS.md for the real per-environment-build fix.
    tag: staging-manual

networkpolicy:
  # scaleway-up.sh installs Traefik into its own `traefik` namespace, not
  # `kube-system` (the chart default, correct for k3d/dev) — every
  # gateway-to-backend NetworkPolicy edge silently blocks Traefik without this.
  gatewayNamespace: traefik
