# Prod overlay — not deployed anywhere yet (NFR-ARC-2: design for future
# cloud/environment integration without forcing it). Demonstrates the
# per-environment override convention future service subcharts follow.
global:
  environment: prod
  namespace: beekeepingit-prod
  resources:
    small:
      requests: { cpu: 100m, memory: 128Mi }
      limits: { cpu: 200m, memory: 256Mi }
    medium:
      requests: { cpu: 250m, memory: 256Mi }
      limits: { cpu: 500m, memory: 512Mi }
    large:
      requests: { cpu: 500m, memory: 512Mi }
      limits: { cpu: "1", memory: 1Gi }

# Observability stack (#87) is only actually deployed in dev today — disable it here
# so this overlay only proves the override mechanism (NFR-ARC-2), not a real rollout.
kube-prometheus-stack:
  enabled: false
loki:
  enabled: false
tempo:
  enabled: false
opentelemetry-collector:
  enabled: false
alert-webhook-sink:
  enabled: false
