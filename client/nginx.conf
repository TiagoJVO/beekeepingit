server {
    # 8080, not 80: the container now runs as non-root (client/Dockerfile,
    # EPIC-14 #89), and only root can bind a port <1024.
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # PowerSync's web worker + wasm SQLite need cross-origin isolation for
    # OPFS/SharedArrayBuffer.
    add_header Cross-Origin-Opener-Policy same-origin always;
    add_header Cross-Origin-Embedder-Policy require-corp always;

    # --- Security headers (EPIC-14 #89, NFR-SEC-1) ---
    #
    # X-Content-Type-Options: stop the browser from MIME-sniffing responses into
    # a more dangerous type than the server declared (classic stored-XSS vector
    # via a mis-typed upload).
    add_header X-Content-Type-Options nosniff always;
    # Referrer-Policy: never leak the full URL (which can carry an OIDC `code`/
    # `state` query param mid-login) to a third-party origin via the Referer
    # header; still send it on same-origin navigation for basic diagnostics.
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Content-Security-Policy, scoped to what this Flutter web build actually
    # loads — verified against client/web/index.html + the build pipeline
    # (client/README.md), not a generic template:
    #   - `flutter build web` always runs with `--no-web-resources-cdn`
    #     (client/README.md, build-publish.yml) — CanvasKit, fonts, and
    #     PowerSync's wasm/worker assets are all bundled into build/web/ and
    #     served same-origin. Nothing is fetched from www.gstatic.com or any
    #     other CDN, so script-src/connect-src need no third-party host.
    #   - `script-src 'self' 'wasm-unsafe-eval'`: Flutter's bootstrap loader +
    #     CanvasKit/skwasm and PowerSync's SQLite all compile/instantiate wasm
    #     modules same-origin — 'wasm-unsafe-eval' is the CSP3 keyword scoped to
    #     wasm compilation (unlike 'unsafe-eval', it does NOT allow JS eval()).
    #   - `worker-src 'self'`: Flutter's web worker + PowerSync's sync worker are
    #     both bundled same-origin.
    #   - `connect-src 'self' https://auth.beekeepingit.local:8443`: the app
    #     fetches OIDC discovery (`.well-known`) and posts to the token endpoint
    #     on the auth host (client/lib/core/auth/auth_controller.dart), plus its
    #     own gateway APIs / PowerSync sync-stream (same-origin, `'self'`). No
    #     other host is ever called from the client. The auth host is the ONLY
    #     hardcoded value here — today it's the sole real value in the repo (the
    #     staging/prod Helm overlays don't yet define a different one, see
    #     environments/{staging,prod}.yaml). If/when a real non-local auth host
    #     ships, this file needs to become environment-templated (envsubst at
    #     container start, matching how other static configs would parameterize)
    #     rather than a hardcoded string — tracked on issue #89.
    #   - `style-src 'self' 'unsafe-inline'`: Flutter web injects its own <style>
    #     tags/inline styles at runtime for text layout; there is no external
    #     stylesheet to scope this down further.
    #   - `img-src 'self' data:`: app icons/favicon are bundled; `data:` covers
    #     Flutter's inlined image assets (e.g. semantic placeholders).
    #   - `object-src 'none'`, `base-uri 'self'`, `frame-ancestors 'none'`: no
    #     plugin content, no <base> injection, and the app is never meant to be
    #     framed (defense in depth alongside COOP above).
    #
    # NOTE (rollout): shipped as Content-Security-Policy-Report-Only for the
    # first release. This repo's CI cannot exercise a real browser against the
    # built app (no live cluster in CI, #89), so a directive that's subtly wrong
    # for the actual CanvasKit/skwasm/PowerSync wasm loading path would silently
    # break the app rather than just report. Report-only ships the exact same
    # policy without enforcing it, so it can be validated against a real browser
    # (dev/staging) before flipping to the enforcing `Content-Security-Policy`
    # header — tracked on issue #89.
    add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; worker-src 'self'; connect-src 'self' https://auth.beekeepingit.local:8443; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

    # SPA fallback: client-side routes (go_router) resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
