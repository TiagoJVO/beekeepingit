name: beekeepingit_client
description: "BeekeepingIT field app — Flutter Web PWA (D-5, D-10)."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  go_router: ^17.2.3
  intl: 0.20.2
  http: ^1.6.0
  powersync: ^1.18.0
  crypto: ^3.0.7
  web: ^1.1.1
  uuid: ^4.5.3
  # Provider-agnostic OIDC: discovery (`Issuer.discover`) + Authorization Code
  # + PKCE (`Flow.authorizationCodeWithPKCE`) driven behind the AuthPlatform
  # seam. Deliberately NOT openid_client_browser (that's the implicit flow).
  # See docs/architecture/oidc-integration.md §7.
  openid_client: ^0.4.10
  # Device location for proximity ordering (FR-AP-2, #33): permission
  # request + last-known/current position, with a working web (PWA)
  # implementation via the browser Geolocation API — matches D-5/D-10's
  # Flutter Web PWA target, not just native.
  geolocator: ^14.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true # regenerate lib/l10n/gen from l10n.yaml + lib/l10n/arb/*.arb
