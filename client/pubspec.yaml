name: beekeepingit_client
description: "BeekeepingIT field app — Flutter Web PWA (D-5, D-10)."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  go_router: ^17.2.3
  intl: 0.20.2
  http: ^1.6.0
  powersync: ^1.18.0
  crypto: ^3.0.7
  meta: ^1.18.0
  web: ^1.1.1
  uuid: ^4.6.0
  # Provider-agnostic OIDC: discovery (`Issuer.discover`) + Authorization Code
  # + PKCE (`Flow.authorizationCodeWithPKCE`) driven behind the AuthPlatform
  # seam. Deliberately NOT openid_client_browser (that's the implicit flow).
  # See docs/architecture/oidc-integration.md §7.
  openid_client: ^0.4.10
  # Map view (D-16, #34): flutter_map + MapLibre/OSM tiles per tech-stack.md;
  # latlong2 is flutter_map's LatLng type.
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  # Device location — for both #34's map "Você" marker and #33's offline
  # proximity ordering (FR-AP-2): permission request + last-known/current
  # position, with a working web (PWA) implementation via the browser
  # Geolocation API — matches D-5/D-10's Flutter Web PWA target, not just
  # native. Graceful permission handling required by both ACs.
  geolocator: ^14.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # Direct dev dependency so tests can fake GeolocatorPlatform.instance
  # (apiary_map_screen_test.dart, #34) — otherwise only a transitive dep of
  # geolocator.
  geolocator_platform_interface: ^4.2.8

flutter:
  uses-material-design: true
  generate: true # regenerate lib/l10n/gen from l10n.yaml + lib/l10n/arb/*.arb

  # Melargil brand typography (FR-UX-1, FR-AX-1, D-18, #243), bundled as
  # assets — offline-first, NO runtime font fetching (no google_fonts, no CDN).
  # Static per-weight TTFs from Google Fonts (OFL 1.1; license file lives
  # beside each family under fonts/<Family>/OFL.txt). Archivo is the app-wide
  # default (AppTheme.bodyFontFamily); Playfair Display is applied to
  # display/headline/title styles (AppTheme.displayFontFamily). See
  # docs/design/prototype.md §Type and client/lib/theming/app_theme.dart.
  fonts:
    - family: Archivo
      fonts:
        - asset: fonts/Archivo/Archivo-Regular.ttf
          weight: 400
        - asset: fonts/Archivo/Archivo-Medium.ttf
          weight: 500
        - asset: fonts/Archivo/Archivo-SemiBold.ttf
          weight: 600
        - asset: fonts/Archivo/Archivo-Bold.ttf
          weight: 700
    - family: Playfair Display
      fonts:
        - asset: fonts/PlayfairDisplay/PlayfairDisplay-SemiBold.ttf
          weight: 600
        - asset: fonts/PlayfairDisplay/PlayfairDisplay-Bold.ttf
          weight: 700
