name: beekeepingit_client
description: "BeekeepingIT field app — Flutter Web PWA (D-5, D-10)."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  go_router: ^17.2.3
  intl: 0.20.2
  http: ^1.6.0
  powersync: ^1.18.0
  crypto: ^3.0.7
  web: ^1.1.1
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true # regenerate lib/l10n/gen from l10n.yaml + lib/l10n/arb/*.arb
