# markdownlint-cli2 config (https://github.com/DavidAnson/markdownlint-cli2).
# Lenient where our docs intentionally use wide/hand-wrapped prose and inline HTML.
config:
  default: true
  MD013: false # line length — prose is hand-wrapped, not machine-wrapped
  MD033: false # inline HTML — used for emoji headings / rich tables
  MD041: false # first line need not be a top-level heading (badges/notes)
  MD018: false # hand-wrapped prose can start a line with an inline "#123" issue ref,
  # which looks like a malformed ATX heading but isn't one
  MD036: false # every ADR's "## Consequences" section uses bold **Positive**/**Negative**
  # sub-labels by deliberate convention, not as a heading substitute
  MD024:
    siblings_only: true # allow duplicate headings under different parents

# Files/dirs markdownlint should never look at (glob patterns).
ignores:
  - "**/node_modules/**"
  - "**/vendor/**"
  - ".claude/worktrees/**"
  - "CHANGELOG.md"
