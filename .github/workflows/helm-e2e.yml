name: Helm E2E

# Live-cluster counterpart to helm-ci.yml's dry-run (NFR-TST-1, #154): stands up an
# ephemeral k3d cluster, installs the umbrella chart, and runs `helm test` against it
# — so the `postgres` subchart's PostGIS smoke-query hook (#84) is exercised in CI, not
# only manually against a developer's local cluster.
#
# Also runs the walking-skeleton Playwright e2e (`client/e2e`, NFR-TST-1, #162) against
# that same live stack — login (OIDC) → create an apiary → offline edit → sync →
# server-side assertion → reload convergence → fresh-client download convergence →
# logout. It was a manual pre-merge gate until now; the domain-service readiness gate
# added below (#215) means the slice reliably comes up authenticated in CI, so the e2e
# can finally run unattended. Deliberately reuses this job's own bring-up (not a second
# k3d cluster in a separate workflow) — cheaper and keeps one source of truth for "how
# the slice comes up in CI".
#
# Like helm-ci.yml, this is designed to be a REQUIRED status check on `main`, so the job
# runs on EVERY PR/push (no path filter on the trigger) — otherwise a PR that doesn't
# touch infra/** would never start the job, its required "Expected" status would never
# report, and it would block merging forever. Path-relevance is instead checked INSIDE
# the job (dorny/paths-filter): on an irrelevant PR every real step is skipped — not
# absent — so the check reports success in seconds without spinning up a cluster; only a
# PR that changes the charts/cluster scripts (or the e2e test itself) pays for the
# (minutes-long) live bring-up.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  live-cluster-test:
    name: k3d cluster + helm test
    runs-on: ubuntu-latest
    # Authentik + its own bundled Postgres is heavier to boot than the previous IdP
    # (bootstrap migrations + blueprint apply), so the whole job gets more room
    # (ADR-0016, oidc-integration.md §8).
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # Two outputs: `infra` (unchanged) gates the existing helm-test bring-up;
      # `e2e` additionally covers the Playwright test itself so a change to
      # `client/e2e/**` alone (no infra/chart edit) still exercises it. `e2e` is
      # the superset every e2e-specific step below is actually gated on, since
      # running the e2e needs the exact same live bring-up `infra` already gates.
      # (Listed out flat rather than via a YAML anchor: the `filters` value is a
      # literal block string that dorny/paths-filter re-parses on its own, and an
      # anchor/alias in there would produce a nested list, not a flat pattern list.)
      - name: Check for relevant changes
        id: changes
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            infra:
              - 'infra/helm/**'
              - 'infra/cluster/**'
              - 'infra/gitops/apps/dev/authentik-helmrelease.yaml'
              - '.github/workflows/helm-e2e.yml'
            e2e:
              - 'infra/helm/**'
              - 'infra/cluster/**'
              - 'infra/gitops/apps/dev/authentik-helmrelease.yaml'
              - '.github/workflows/helm-e2e.yml'
              - 'client/e2e/**'

      # helm/kubectl/k3d at the versions pinned in mise.toml — the same toolchain
      # local dev (infra/cluster/*.sh) and the rest of CI use.
      - name: Set up toolchains from mise.toml
        if: steps.changes.outputs.e2e == 'true'
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      # Create the k3d cluster and install the CNPG operator by running the exact
      # script developers run locally, so CI validates the real bring-up path
      # rather than a CI-only copy that can silently drift from it. (`up.sh` takes a
      # flock lock — harmless here: an ephemeral runner is a single, isolated user.)
      - name: Bring up the cluster (k3d + CNPG operator)
        if: steps.changes.outputs.e2e == 'true'
        run: infra/cluster/up.sh

      # Install the packaged subchart snapshots under charts/*.tgz (see the chart's
      # README) — the umbrella's deps are all local file:// / vendored, so no chart
      # repo network access is needed.
      - name: Fetch umbrella chart dependencies
        if: steps.changes.outputs.e2e == 'true'
        run: helm dependency build infra/helm/beekeepingit

      # No --wait, matching dev-up.sh: with --wait, Helm blocks on the main resources
      # (incl. PowerSync) becoming ready *before* running the postgres schema-grants
      # post-install hook — but PowerSync can't become ready until that hook has run,
      # a deadlock. Without --wait, Helm applies the resources then runs the hook,
      # which blocks (retrying) until Postgres is serving and the grants land — so by
      # the time this returns, Postgres is already up. A generous --timeout covers the
      # first CNPG/PostGIS image pull on a cold runner.
      - name: Install the umbrella release
        if: steps.changes.outputs.e2e == 'true'
        run: |
          helm upgrade --install beekeepingit infra/helm/beekeepingit \
            -f infra/helm/beekeepingit/environments/dev.yaml \
            --namespace beekeepingit-dev --create-namespace \
            --timeout 15m

      # Explicit readiness gate (the install above already blocked on the grants hook,
      # so the pod exists by now — but assert condition=ready before testing against it).
      - name: Wait for Postgres
        if: steps.changes.outputs.e2e == 'true'
        run: |
          kubectl -n beekeepingit-dev wait --for=condition=ready pod \
            -l cnpg.io/cluster=beekeepingit-postgres --timeout=300s

      # Authentik is its own Flux HelmRelease (ADR-0012/0016), so — to exercise its
      # `helm test` readiness hook below — bring it up here the same way dev-up.sh does
      # for the local loop: install the Flux controllers, then apply the HelmRelease with
      # its `dependsOn: [beekeepingit]` stripped (that guard targets a GitOps-bootstrapped
      # HelmRelease object this direct-apply path doesn't create; the umbrella install
      # above already created the config/Postgres Secrets + blueprint ConfigMap it needs).
      - name: Set up Flux CLI
        if: steps.changes.outputs.e2e == 'true'
        uses: fluxcd/flux2/action@4a15fa6a023259353ef750acf1c98fe88407d4d0 # v2.7.2
      - name: Bring up Authentik (Flux HelmRelease)
        if: steps.changes.outputs.e2e == 'true'
        run: |
          flux install
          sed '/^  dependsOn:$/,+1d' infra/gitops/apps/dev/authentik-helmrelease.yaml \
            | kubectl apply -f -
          # The server Deployment is created by helm-controller a moment after the
          # HelmRelease reconciles; wait for it to appear, then for the rollout (the
          # server only goes ready once its Postgres is up, migrations have run, and the
          # blueprint applied). Generous timeout for a cold image pull + bootstrap.
          for _ in $(seq 1 60); do
            kubectl -n beekeepingit-dev get deploy/authentik-server >/dev/null 2>&1 && break
            sleep 5
          done
          kubectl -n beekeepingit-dev rollout status deployment/authentik-server --timeout=600s

      # The server being Ready is NOT enough for the domain services: the WORKER applies
      # the blueprint (provider/application/seed user) asynchronously after boot, and
      # until it lands, OIDC discovery 404s and every Go service crash-restarts with a
      # growing backoff (up to 5 min). So: wait for the worker rollout (it does the
      # apply), poll discovery until it 200s, then restart the services once to clear the
      # accumulated CrashLoopBackOff — otherwise the readiness gate below races pod
      # backoff timers, not real readiness.
      - name: Wait for the Authentik blueprint (OIDC discovery answers), reset backoffs
        if: steps.changes.outputs.e2e == 'true'
        run: |
          kubectl -n beekeepingit-dev rollout status deployment/authentik-worker --timeout=600s
          # Poll discovery by exec-ing INTO the authentik-server pod and curling its own
          # localhost. exec runs over the kube API (not pod networking) and localhost is
          # loopback, so this is immune to the NetworkPolicy default-deny (#89) — a
          # separate probe pod or a runner port-forward is not. 90×10s = 15 min, since a
          # cold CI worker can be slow to finish applying the blueprint.
          # Re-resolve the server pod EACH iteration: on a fresh cluster authentik-server
          # can restart mid-poll (cold-DB migrations, startup-probe cycling), and a pod
          # name captured once goes stale — every exec then fails forever and the poll
          # times out even after discovery is actually serving on the new pod.
          for i in $(seq 1 90); do
            POD=$(kubectl -n beekeepingit-dev get pod \
              -l app.kubernetes.io/name=authentik,app.kubernetes.io/component=server \
              --field-selector=status.phase=Running \
              -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
            if [ -n "$POD" ] && kubectl -n beekeepingit-dev exec "$POD" -- \
                 curl -sf http://localhost:9000/application/o/beekeepingit/.well-known/openid-configuration >/dev/null 2>&1; then
              echo "discovery answered after ~$((i*10))s"
              break
            fi
            if [ "$i" = "90" ]; then
              echo "::error::blueprint never applied — discovery still 404 after 900s"
              exit 1
            fi
            sleep 10
          done
          kubectl -n beekeepingit-dev rollout restart deployment \
            -l app.kubernetes.io/part-of=beekeepingit

      # Explicit readiness gate for the domain services (identity, organizations, apiaries,
      # sync, pwa, powersync, ...) — not just Postgres/Authentik above. Without this, a
      # service stuck in CrashLoopBackOff (e.g. a search_path-dependent SQL bug that only
      # reproduces under that service's restricted DB role) passes the whole pipeline
      # undetected, because nothing ever asserted the pods became Ready (#215). Every
      # Deployment in the umbrella chart carries this label via `beekeepingit.labels`
      # (infra/helm/beekeepingit/templates/_helpers.tpl), so one selector covers all of them.
      - name: Wait for domain-service deployments
        if: steps.changes.outputs.e2e == 'true'
        run: |
          # Backoffs were just reset by the rollout restart above, so this is a clean
          # boot: image start + probe warmup only.
          kubectl -n beekeepingit-dev wait --for=condition=available deployment \
            -l app.kubernetes.io/part-of=beekeepingit --timeout=600s

      # The AC: the postgres PostGIS smoke-query hook AND the authentik readiness hook run
      # automatically. As minio/gateway grow their own `helm test` liveness hooks, they run
      # here too.
      - name: helm test (PostGIS smoke query + Authentik readiness)
        if: steps.changes.outputs.e2e == 'true'
        run: helm test beekeepingit --namespace beekeepingit-dev

      # Node itself already came from "Set up toolchains from mise.toml" above
      # (mise.toml pins node = 22, the same toolchain local dev uses) — no
      # separate actions/setup-node needed.
      - name: Install e2e dependencies
        if: steps.changes.outputs.e2e == 'true'
        working-directory: client/e2e
        run: npm ci

      # Chromium only (playwright.config.ts's one project) + its OS deps.
      - name: Install Playwright browsers
        if: steps.changes.outputs.e2e == 'true'
        working-directory: client/e2e
        run: npm run install-browsers

      # Runs the walking-skeleton spec (#23 §7.3, NFR-TST-1, #162) against the gateway
      # this job just brought up, over the same host:8443 -> in-cluster:443 k3d port
      # mapping local dev uses (k3d-config.yaml) — no port-forward needed. Defaults in
      # playwright.config.ts already point at https://app.beekeepingit.local:8443 and
      # map both dev hostnames to loopback via --host-resolver-rules, so no runner
      # /etc/hosts edit either; the config also already sets ignoreHTTPSErrors /
      # --ignore-certificate-errors for the dev gateway's self-signed cert. The seed
      # user (test.beekeeper@beekeepingit.local) comes from the Authentik blueprint
      # applied during bring-up above.
      - name: Run the walking-skeleton e2e
        if: steps.changes.outputs.e2e == 'true'
        working-directory: client/e2e
        run: npm test

      # Playwright's own trace/screenshot/HTML report (playwright.config.ts:
      # trace: on-first-retry, screenshot: only-on-failure) — the fastest way to
      # debug a red run without re-running the whole live cluster locally.
      - name: Upload Playwright report
        if: failure() && steps.changes.outputs.e2e == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: client/e2e/playwright-report/
          retention-days: 7

      # Test-data teardown (#162 AC): the spec's own afterAll deletes the apiary it
      # created via the apiaries API (see slice.spec.ts) so re-runs against a
      # longer-lived environment don't accumulate rows. Belt-and-braces here too,
      # since this job's cluster is destroyed at the end regardless (Tear down the
      # cluster, below) — so on THIS job the afterAll is defense in depth, not the
      # only thing keeping runs isolated; the cluster teardown is.

      # Make a red run debuggable without re-running locally. Gated on the filter too:
      # on an irrelevant PR the tools were never installed, so these kubectl calls would
      # error on a missing binary rather than help.
      - name: Diagnostics (on failure)
        if: failure() && steps.changes.outputs.e2e == 'true'
        run: |
          kubectl get pods -A -o wide || true
          kubectl -n beekeepingit-dev describe pods || true
          kubectl -n beekeepingit-dev get deployment -o wide || true
          kubectl -n beekeepingit-dev describe deployment || true
          kubectl -n beekeepingit-dev logs -l cnpg.io/cluster=beekeepingit-postgres --tail=100 || true
          kubectl -n beekeepingit-dev logs -l app.kubernetes.io/name=authentik,app.kubernetes.io/component=server --tail=120 --prefix || true
          kubectl -n beekeepingit-dev logs -l app.kubernetes.io/name=authentik,app.kubernetes.io/component=worker --tail=200 --prefix || true
          kubectl -n beekeepingit-dev logs -l app.kubernetes.io/part-of=beekeepingit --tail=50 --prefix || true
          # Crashlooping containers keep their crash output on the PREVIOUS instance;
          # plain `logs` on a just-restarted container is usually empty.
          for d in identity organizations apiaries sync pwa beekeepingit-powersync; do
            echo "=== previous logs: $d ==="
            kubectl -n beekeepingit-dev logs "deploy/$d" --previous --tail=30 || true
          done
          kubectl get helmrelease -A || true
          kubectl -n beekeepingit-dev get events --sort-by=.lastTimestamp || true

      # Tear down regardless of pass/fail (AC). Gated on the filter (else down.sh runs on
      # an irrelevant PR where k3d was never installed and fails on the missing binary).
      # The runner is ephemeral, but deleting the cluster explicitly keeps the job honest
      # and mirrors down.sh's cleanup.
      - name: Tear down the cluster
        if: always() && steps.changes.outputs.e2e == 'true'
        run: infra/cluster/down.sh
