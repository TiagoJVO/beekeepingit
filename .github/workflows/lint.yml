# Enforce the monorepo tooling in CI: everything must be format-clean and lint-clean.
# Runs `task ci`, which today exercises repo-hygiene checks (Prettier, Markdown, actionlint,
# shellcheck, gitleaks) plus per-language linters that no-op until packages exist.
# Per-language, path-filtered build/test matrices are added in EPIC-13.
name: lint

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for gitleaks
      - name: Set up toolchains from mise.toml
        uses: jdx/mise-action@v2
      - name: Lint (format check + all linters)
        run: task ci
