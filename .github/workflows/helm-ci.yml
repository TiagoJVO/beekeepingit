name: Helm CI

# Validates the platform charts on every change: dependency build, `helm lint`,
# and a `helm template` dry-run — for the beekeepingit umbrella chart (base
# values + every per-environment overlay) and the observability chart (#87,
# base values only; per-environment config lives on its Flux HelmRelease's
# `values:`, not overlay files — ADR-0013). No live cluster is used here —
# deploying to the cluster is a separate concern (EPIC-13 #86/#88).
#
# This is a required status check on `main`, so the job runs on EVERY PR/push (no path filter
# on the trigger) — otherwise a PR that doesn't touch infra/helm/** would never get a run for
# this check and its "Expected" status would block merging forever. Path-relevance is instead
# checked inside the job (dorny/paths-filter) so the real helm steps are skipped — not
# absent — when irrelevant, and the check still reports success quickly.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-template:
    name: helm lint & template dry-run
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/helm/beekeepingit
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Check for relevant changes
        id: changes
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            helm:
              - 'infra/helm/**'
              - '.github/workflows/helm-ci.yml'

      - name: Set up Helm
        if: steps.changes.outputs.helm == 'true'
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: "v3.21.2"

      # Every subchart is a local file:// dependency (postgres/gateway are
      # hand-rolled; keycloak/minio only hold supplementary Secrets/ConfigMaps
      # now — the actual vendored charts are separate Flux HelmReleases, see
      # ADR-0012), so this never needs network access to a chart repo.
      - name: helm dependency build
        if: steps.changes.outputs.helm == 'true'
        run: helm dependency build .

      - name: helm lint (base values)
        if: steps.changes.outputs.helm == 'true'
        run: helm lint .

      - name: helm lint (per-environment overlays)
        if: steps.changes.outputs.helm == 'true'
        run: |
          for env in dev staging prod; do
            echo "::group::lint $env"
            helm lint . -f "environments/$env.yaml"
            echo "::endgroup::"
          done

      - name: helm template dry-run (base values)
        if: steps.changes.outputs.helm == 'true'
        run: helm template beekeepingit .

      - name: helm template dry-run (per-environment overlays)
        if: steps.changes.outputs.helm == 'true'
        run: |
          for env in dev staging prod; do
            echo "::group::template $env"
            helm template beekeepingit . -f "environments/$env.yaml"
            echo "::endgroup::"
          done

      # Unlike the umbrella above, this chart's four vendored dependencies are
      # remote (prometheus-community / grafana / open-telemetry chart repos), so
      # this step DOES need network access — same as any local `helm dependency
      # build` of it.
      - name: helm dependency build (observability)
        if: steps.changes.outputs.helm == 'true'
        working-directory: infra/helm/observability
        run: helm dependency build .

      - name: helm lint (observability)
        if: steps.changes.outputs.helm == 'true'
        working-directory: infra/helm/observability
        run: helm lint .

      - name: helm template dry-run (observability)
        if: steps.changes.outputs.helm == 'true'
        working-directory: infra/helm/observability
        run: helm template observability .
