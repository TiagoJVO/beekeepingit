# Security / supply-chain scan stage for the monorepo CI (EPIC-13 #88; requirement NFR-TST-1,
# and the scanning half of EPIC-14 #89 — this workflow WIRES the CI stage, #89 owns the final
# severity policy). Container-IMAGE scanning lives in build-publish.yml (it needs a built image);
# this file covers repo-level dependency + secret + IaC scanning that runs today.
#
# Three independent gates so a failure points at one cause:
#   trivy-deps   — dependency (SBOM) + secret scan of the working tree  → BLOCKING (HIGH,CRITICAL)
#   govulncheck  — Go call-graph-aware vuln scan of every module        → BLOCKING
#   trivy-config — IaC/misconfig scan (Helm, k8s, Actions, Dockerfiles) → BLOCKING (HIGH,CRITICAL)
#
# trivy-config was report-only until #89 triaged the pre-existing Helm/k8s baseline (20 HIGH
# findings): fixed most (securityContext on every Go domain service, drop-caps on powersync),
# and added narrowly-scoped, individually-justified entries to the repo-root .trivyignore for the
# deferred ones (the Authentik dev-seed blueprint password — a throwaway dev/CI credential; and
# the readOnlyRootFilesystem/non-root hardening of the two vendored web/sync images, powersync
# and the pwa's nginx, deferred to #89/#235 after they proved fragile to verify without a live
# cluster). Every ignore entry is dated/justified in .trivyignore itself, per NFR-SEC-1.
name: security-scan

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  trivy-deps:
    name: trivy (dependencies + secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          # Only fail on vulns that actually have a fix available — unactionable
          # "no fixed version yet" findings shouldn't block a merge.
          ignore-unfixed: true
          exit-code: "1"

  govulncheck:
    name: govulncheck (Go modules)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up toolchains from mise.toml
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      # Same discover-and-no-op pattern as taskfiles/go.yml — runs against every go.mod
      # (services/shared today) and exits 0 cleanly when no Go module exists yet.
      - name: govulncheck
        run: task go:vuln

  trivy-config:
    name: trivy (IaC / misconfig)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          # Baseline triaged (#89) — see .trivyignore for the two remaining,
          # individually-justified entries. trivy-action reads the repo-root
          # .trivyignore automatically (same default as the CLI).
          exit-code: "1"
