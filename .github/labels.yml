# Label taxonomy for BeekeepingIT.
# Apply with a label-sync tool (e.g. micnncim/action-label-syncer, EndBug/label-sync)
# or scripted `gh label create`. Colors are hex without the leading '#'.

# --- Type ---
- name: "type/bug"
  color: "d73a4a"
  description: "Something isn't working"
- name: "type/feature"
  color: "0e8a16"
  description: "User-facing capability or story"
- name: "type/task"
  color: "1d76db"
  description: "Technical task, refactor, or chore"
- name: "type/spike"
  color: "5319e7"
  description: "Time-boxed research/investigation"
- name: "type/docs"
  color: "0075ca"
  description: "Documentation only"
- name: "type/epic"
  color: "3e4b9e"
  description: "Large body of work spanning multiple issues"

# --- Priority ---
- name: "priority/critical"
  color: "b60205"
  description: "Drop everything"
- name: "priority/high"
  color: "d93f0b"
  description: "Important, schedule soon"
- name: "priority/medium"
  color: "fbca04"
  description: "Normal priority"
- name: "priority/low"
  color: "c2e0c6"
  description: "Nice to have"

# --- Status ---
- name: "status/needs-triage"
  color: "ededed"
  description: "Awaiting triage"
- name: "status/needs-info"
  color: "d4c5f9"
  description: "Blocked on missing information"
- name: "status/blocked"
  color: "000000"
  description: "Blocked by a dependency"
- name: "status/ready"
  color: "0e8a16"
  description: "Ready to be worked on"

# --- Area (domains from the requirements) ---
- name: "area/apiaries"
  color: "fef2c0"
  description: "Apiaries (CRUD, map, list, search, distance)"
- name: "area/activities"
  color: "fef2c0"
  description: "Activities and activity types"
- name: "area/journeys"
  color: "fef2c0"
  description: "Journeys and aggregated statistics"
- name: "area/todos"
  color: "fef2c0"
  description: "Todos"
- name: "area/ai"
  color: "c5def5"
  description: "AI assistant / on-device LLM"
- name: "area/offline-sync"
  color: "c5def5"
  description: "Offline support and synchronization"
- name: "area/auth-identity"
  color: "bfd4f2"
  description: "Authentication, identity, sessions"
- name: "area/rbac"
  color: "bfd4f2"
  description: "Roles, permissions, access control"
- name: "area/org-tenancy"
  color: "bfd4f2"
  description: "Organizations, membership, multi-tenancy"
- name: "area/history-audit"
  color: "d2b48c"
  description: "Change history / audit trail"
- name: "area/import-export"
  color: "d2b48c"
  description: "CSV/JSON import and export"
- name: "area/admin-app"
  color: "e99695"
  description: "Web admin application"
- name: "area/maps-geo"
  color: "fef2c0"
  description: "Maps, geolocation, distance"
- name: "area/i18n-a11y"
  color: "c2e0c6"
  description: "Internationalization and accessibility"
- name: "area/infra"
  color: "5319e7"
  description: "Kubernetes, CI/CD, deployment"
- name: "area/observability"
  color: "5319e7"
  description: "Logging, metrics, tracing, alerting"
- name: "area/security"
  color: "b60205"
  description: "Security and data protection"

# --- Effort (optional sizing) ---
- name: "size/xs"
  color: "ededed"
  description: "Tiny (< half a day)"
- name: "size/s"
  color: "ededed"
  description: "Small (~1 day)"
- name: "size/m"
  color: "ededed"
  description: "Medium (2-3 days)"
- name: "size/l"
  color: "ededed"
  description: "Large (~1 week)"
- name: "size/xl"
  color: "ededed"
  description: "Extra large (should probably be split)"
